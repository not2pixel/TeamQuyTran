<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng Nhập – TeamQuyTran</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
<link rel="stylesheet" href="../assets/css/global.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: auto; }

/* Animated snake background */
.bg-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 80% 80% at 50% -20%, rgba(34,197,94,0.15) 0%, transparent 60%);
}
.bg-canvas::before {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
        0deg, transparent, transparent 40px,
        rgba(34,197,94,0.03) 40px, rgba(34,197,94,0.03) 41px
    ), repeating-linear-gradient(
        90deg, transparent, transparent 40px,
        rgba(34,197,94,0.03) 40px, rgba(34,197,94,0.03) 41px
    );
}

.auth-card {
    position: relative;
    z-index: 1;
    background: var(--bg-elevated);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-xl);
    padding: 40px;
    width: 100%;
    max-width: 420px;
    margin: 24px;
    box-shadow: var(--shadow-lg), 0 0 60px rgba(34,197,94,0.08);
    animation: slideUp 0.4s ease;
}

.brand {
    text-align: center;
    margin-bottom: 32px;
}
.brand-snake {
    font-size: 56px;
    animation: snakeWiggle 3s ease-in-out infinite;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(34,197,94,0.5));
}
.brand-name {
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(135deg, #86efac, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
}
.brand-slogan {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 4px;
    font-style: italic;
    letter-spacing: 0.05em;
}

.page-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
}
.page-sub {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 24px;
}

.error-box {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    color: var(--text-danger);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
}
.error-box.show { display: block; }

.input-icon { position: relative; }
.input-icon .input { padding-left: 40px; }
.input-icon .icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    font-size: 16px;
}
.input-icon .eye-toggle {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--text-faint);
    font-size: 16px;
    background: none; border: none;
}
.input-icon .eye-toggle:hover { color: var(--accent); }

.forgot-link {
    font-size: 13px;
    color: var(--accent);
    float: right;
    margin-top: -12px;
}
.forgot-link:hover { text-decoration: underline; }

.btn-login {
    width: 100%;
    padding: 13px;
    font-size: 15px;
    margin-top: 20px;
    position: relative;
    overflow: hidden;
}
.btn-login::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s;
}
.btn-login:hover::after { transform: translateX(100%); }

.register-link {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: var(--text-muted);
}
.register-link a { color: var(--accent); font-weight: 600; }
.register-link a:hover { text-decoration: underline; }

.loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,26,15,0.8);
    border-radius: var(--radius-xl);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    display: none;
    z-index: 10;
}
.loading-overlay.show { display: flex; }
.loading-text { color: var(--accent); font-size: 14px; margin-left: 12px; }
</style>
</head>
<body>
<div class="bg-canvas"></div>

<div class="auth-card snake-border">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <span class="loading-text">Đang xác thực...</span>
    </div>

    <div class="brand">
        <span class="brand-snake">🐍</span>
        <div class="brand-name">TeamQuyTran</div>
        <div class="brand-slogan">Hãy sống như một con rắn.</div>
    </div>

    <h2 class="page-title">Chào mừng trở lại!</h2>
    <p class="page-sub">Đăng nhập để tiếp tục</p>

    <div class="error-box" id="errorBox"></div>

    <div class="input-group">
        <label class="input-label">Email hoặc Username</label>
        <div class="input-icon">
            <span class="icon">✉</span>
            <input type="text" class="input" id="emailInput" placeholder="email@example.com" autocomplete="email">
        </div>
    </div>

    <div class="input-group">
        <label class="input-label">Mật khẩu</label>
        <div class="input-icon">
            <span class="icon">🔒</span>
            <input type="password" class="input" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
            <button class="eye-toggle" onclick="togglePass()">👁</button>
        </div>
    </div>

    <a href="#" class="forgot-link" onclick="handleForgot(event)">Quên mật khẩu?</a>

    <button class="btn btn-primary btn-login" onclick="handleLogin()">
        <span>🐍</span> Đăng Nhập
    </button>

    <div class="register-link">
        Chưa có tài khoản? <a href="/Register/">Đăng ký ngay</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../assets/js/core.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    Auth.redirectIfAuth();

    // Enter key support
    ['emailInput', 'passwordInput'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });
    });
});

function togglePass() {
    const inp = document.getElementById('passwordInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.classList.add('show');
}

function hideError() {
    document.getElementById('errorBox').classList.remove('show');
}

function setLoading(val) {
    document.getElementById('loadingOverlay').classList.toggle('show', val);
}

async function handleLogin() {
    hideError();
    const emailOrUser = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;

    if (!emailOrUser || !password) {
        showError('Vui lòng điền đầy đủ thông tin.');
        return;
    }

    setLoading(true);

    try {
        let email = emailOrUser;

        // If not email format, look up by username
        if (!emailOrUser.includes('@')) {
            const { data: profile } = await supabase
                .from('profiles')
                .select('id')
                .eq('username', emailOrUser)
                .single();

            if (!profile) {
                showError('Username không tồn tại.');
                setLoading(false);
                return;
            }

            // Get email from auth (via admin lookup - use edge function in prod)
            // For now require email login or username stored in metadata
            showError('Vui lòng đăng nhập bằng email.');
            setLoading(false);
            return;
        }

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            const msgs = {
                'Invalid login credentials': 'Email hoặc mật khẩu không đúng.',
                'Email not confirmed': 'Email chưa được xác nhận.',
                'Too many requests': 'Quá nhiều lần thử. Vui lòng đợi.',
            };
            showError(msgs[error.message] || 'Đăng nhập thất bại. Thử lại sau.');
            return;
        }

        // Check if banned
        const { data: profile } = await supabase
            .from('profiles')
            .select('is_banned, ban_reason, role')
            .eq('id', data.user.id)
            .single();

        if (profile?.is_banned) {
            await supabase.auth.signOut();
            showError(`Tài khoản đã bị khóa. Lý do: ${profile.ban_reason || 'Vi phạm quy tắc.'}`);
            return;
        }

        // Update online status
        await supabase.from('profiles').update({ status: 'online', last_seen: new Date().toISOString() }).eq('id', data.user.id);

        LocalCache.setUser({ ...data.user, profile });
        window.location.href = '/app/';

    } catch (e) {
        showError('Lỗi kết nối. Kiểm tra internet.');
    } finally {
        setLoading(false);
    }
}

async function handleForgot(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value.trim();
    if (!email || !email.includes('@')) {
        showError('Nhập email để reset mật khẩu.');
        return;
    }
    setLoading(true);
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: `${location.origin}/app/reset-password.html`
    });
    setLoading(false);
    if (error) {
        showError('Không thể gửi email. Thử lại.');
    } else {
        hideError();
        Toast.success('Email reset đã gửi! Kiểm tra hộp thư.');
    }
}
</script>
</body>
</html>
