<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamQuyTran</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* =================================================================
   DESIGN SYSTEM — TeamQuyTran v4
   Classic dark, IBM Plex, clean grid
   ================================================================= */
:root {
  --c0: #0e0e10;   /* deepest bg — server rail */
  --c1: #131315;   /* sidebar bg */
  --c2: #1a1a1d;   /* channel list */
  --c3: #1e1e21;   /* chat bg */
  --c4: #252528;   /* input, elevated */
  --c5: #2e2e32;   /* hover */
  --c6: #3a3a3f;   /* border, divider */

  --acc:   #5865f2;   /* primary accent — blurple */
  --acc2:  #4752c4;
  --green: #23a559;
  --red:   #da373c;
  --gold:  #f0b132;
  --teal:  #19c4b2;

  --t0: #f2f3f5;   /* primary text */
  --t1: #b5bac1;   /* secondary */
  --t2: #80848e;   /* muted */
  --t3: #4e5058;   /* very muted */

  --rail:    72px;
  --side:    240px;
  --mb:      220px;
  --hdr:     48px;

  --r2: 2px; --r4: 4px; --r6: 6px; --r8: 8px; --r12: 12px;
  --tr: 100ms ease;

  --font: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

/* --- Reset --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--c0); color: var(--t0);
  font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: var(--font); }
a { color: var(--acc); text-decoration: none; }
a:hover { text-decoration: underline; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--c6); border-radius: 3px; }
img { display: block; max-width: 100%; }

/* --- Animations (minimal) --- */
@keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideup { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: none } }
@keyframes spin { to { transform: rotate(360deg) } }

/* =================================================================
   LAYOUT — 4-column grid
   ================================================================= */
#app {
  display: none;
  height: 100vh;
  flex-direction: row;
}
#app.show { display: flex; }
#app.hide-mb #panel-mb { display: none; }

/* Rail */
#rail {
  width: var(--rail);
  background: var(--c0);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  gap: 4px;
  flex-shrink: 0;
  overflow-y: auto;
  border-right: 1px solid var(--c6);
}

/* Sidebar */
#sidebar {
  width: var(--side);
  background: var(--c1);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  border-right: 1px solid var(--c6);
}
#sb-head {
  height: var(--hdr);
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-bottom: 1px solid var(--c6);
  font-weight: 600;
  font-size: 15px;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
}
#sb-head:hover { background: var(--c2); }
#sb-head .srv-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#ch-list { flex: 1; overflow-y: auto; padding: 8px 0; }

/* Self panel */
#self-panel {
  background: var(--c0);
  border-top: 1px solid var(--c6);
  padding: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
#self-name { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#self-tag  { font-size: 11px; color: var(--t2); font-family: var(--mono); }

/* Main chat */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--c3);
  min-width: 0;
}
#chat-hdr {
  height: var(--hdr);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  border-bottom: 1px solid var(--c6);
  flex-shrink: 0;
  background: var(--c3);
}
#chat-name  { font-weight: 600; font-size: 15px; }
#chat-topic { font-size: 13px; color: var(--t2); margin-left: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#hdr-divider { width: 1px; height: 20px; background: var(--c6); }

#msgs-wrap { flex: 1; overflow-y: auto; padding: 16px 0 8px; position: relative; }
#msgs-inner { display: flex; flex-direction: column; min-height: 100%; justify-content: flex-end; }

/* Members panel */
#panel-mb {
  width: var(--mb);
  background: var(--c1);
  border-left: 1px solid var(--c6);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px 8px;
}

/* Welcome screen */
#welcome {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  color: var(--t2);
  font-family: var(--mono);
}
#welcome h1 { font-size: 28px; color: var(--t1); font-weight: 700; letter-spacing: -0.03em; }

/* =================================================================
   AUTH PAGE
   ================================================================= */
#auth-page {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  background: var(--c0);
  padding: 24px;
}
#auth-page.show { display: flex; }
.auth-box {
  width: 100%;
  max-width: 400px;
  background: var(--c1);
  border: 1px solid var(--c6);
  border-radius: var(--r8);
  padding: 32px;
}
.auth-logo {
  text-align: center;
  margin-bottom: 24px;
}
.auth-logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  background: var(--acc);
  border-radius: var(--r8);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.auth-title { font-size: 22px; font-weight: 700; }
.auth-sub   { font-size: 13px; color: var(--t2); margin-top: 4px; }
.auth-tabs  { display: flex; gap: 2px; background: var(--c2); border-radius: var(--r6); padding: 3px; margin-bottom: 20px; }
.auth-tab   { flex: 1; padding: 7px; font-size: 13px; font-weight: 600; border-radius: var(--r4); color: var(--t2); transition: background var(--tr), color var(--tr); }
.auth-tab.on { background: var(--c5); color: var(--t0); }
.auth-view  { display: none; }
.auth-view.on { display: block; animation: fadein 0.15s ease; }

/* =================================================================
   COMPONENTS
   ================================================================= */

/* Rail button */
.rail-btn {
  width: 48px;
  height: 48px;
  border-radius: 24px;
  background: var(--c2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: border-radius var(--tr), background var(--tr);
  color: var(--t0);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  font-family: var(--mono);
}
.rail-btn:hover  { border-radius: var(--r12); background: var(--acc); }
.rail-btn.active { border-radius: var(--r12); background: var(--acc); }
.rail-sep { width: 32px; height: 2px; background: var(--c6); border-radius: 1px; margin: 4px 0; }
.rail-btn img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }

/* Channel row */
.ch-cat {
  padding: 16px 8px 4px 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--t2);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 4px;
}
.ch-cat-add {
  margin-left: auto;
  cursor: pointer;
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r4);
  font-size: 16px;
  line-height: 1;
  color: var(--t2);
}
.ch-cat-add:hover { background: var(--c5); color: var(--t0); }
.ch-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  margin: 1px 4px;
  border-radius: var(--r4);
  cursor: pointer;
  color: var(--t2);
  font-size: 14px;
  font-weight: 500;
}
.ch-row:hover  { background: var(--c5); color: var(--t1); }
.ch-row.active { background: var(--c5); color: var(--t0); }
.ch-pre { font-size: 16px; width: 18px; text-align: center; font-family: var(--mono); flex-shrink: 0; }
.ch-row-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Input */
.field { margin-bottom: 16px; }
.label { display: block; font-size: 12px; font-weight: 600; color: var(--t1); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 6px; }
.inp {
  width: 100%;
  background: var(--c0);
  border: 1px solid var(--c6);
  border-radius: var(--r4);
  padding: 10px 12px;
  font-size: 14px;
  color: var(--t0);
  outline: none;
  transition: border-color var(--tr);
}
.inp:focus { border-color: var(--acc); }
.inp::placeholder { color: var(--t3); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  border-radius: var(--r4);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: filter var(--tr), opacity var(--tr);
}
.btn:hover   { filter: brightness(1.1); }
.btn:active  { filter: brightness(0.9); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }
.btn-primary { background: var(--acc); color: #fff; }
.btn-danger  { background: var(--red); color: #fff; }
.btn-ghost   { background: var(--c5); color: var(--t0); }
.btn-sm      { padding: 6px 12px; font-size: 13px; }
.btn-icon    { padding: 6px; border-radius: var(--r4); background: transparent; color: var(--t2); width: 32px; height: 32px; }
.btn-icon:hover { background: var(--c5); color: var(--t0); }
.w-full { width: 100%; }
.mt8 { margin-top: 8px; }

/* Alert / error */
.alert { padding: 10px 12px; border-radius: var(--r4); font-size: 13px; margin-bottom: 12px; display: none; }
.alert.show { display: block; }
.alert-err  { background: rgba(218,55,60,0.15); border: 1px solid var(--red); color: #ff7b7e; }
.alert-ok   { background: rgba(35,165,89,0.15); border: 1px solid var(--green); color: #4ade80; }

/* Avatar */
.av {
  border-radius: 50%;
  background: var(--c6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
  font-family: var(--mono);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.av img { width: 100%; height: 100%; object-fit: cover; }
.av-32 { width: 32px; height: 32px; }
.av-40 { width: 40px; height: 40px; }
.av-72 { width: 72px; height: 72px; font-size: 22px; }

/* Status dot */
.sdot {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid var(--c1);
}
.sdot.online  { background: var(--green); }
.sdot.idle    { background: var(--gold); }
.sdot.dnd     { background: var(--red); }
.sdot.offline { background: var(--t3); }

/* Badge */
.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: var(--r4);
  font-family: var(--mono);
  text-transform: uppercase;
}
.badge-admin     { background: rgba(240,177,50,0.2); color: var(--gold); }
.badge-moderator { background: rgba(88,101,242,0.2); color: #7986fd; }
.badge-bot       { background: rgba(25,196,178,0.2); color: var(--teal); }

/* Messages */
.msg-group {
  display: flex;
  gap: 12px;
  padding: 2px 16px;
  animation: fadein 0.1s ease;
}
.msg-group:hover { background: rgba(0,0,0,0.15); }
.msg-group:hover .msg-acts { opacity: 1; }
.msg-group.compact .msg-av { visibility: hidden; }
.msg-av { padding-top: 2px; }
.msg-body { flex: 1; min-width: 0; }
.msg-hdr { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
.msg-author { font-weight: 600; font-size: 14px; cursor: pointer; }
.msg-author:hover { text-decoration: underline; }
.msg-author.admin     { color: var(--gold); }
.msg-author.moderator { color: #7986fd; }
.msg-author.bot       { color: var(--teal); }
.msg-time   { font-size: 11px; color: var(--t3); font-family: var(--mono); }
.msg-edited { font-size: 11px; color: var(--t3); font-style: italic; }
.msg-text { font-size: 14px; color: var(--t1); line-height: 1.55; word-break: break-word; }
.msg-text.system { color: var(--t2); font-style: italic; }
.msg-text code { background: var(--c0); border-radius: var(--r4); padding: 1px 5px; font-family: var(--mono); font-size: 13px; color: #e06c75; }
.msg-text pre { background: var(--c0); border: 1px solid var(--c6); border-radius: var(--r6); padding: 12px; margin: 6px 0; overflow-x: auto; }
.msg-text pre code { background: none; padding: 0; }
.msg-text blockquote { border-left: 3px solid var(--c6); padding-left: 10px; margin: 4px 0; color: var(--t2); }
.msg-text .spoiler { background: var(--c0); color: transparent; border-radius: var(--r4); cursor: pointer; padding: 0 4px; }
.msg-text .spoiler.open { color: var(--t1); background: var(--c5); }
.msg-text strong { color: var(--t0); }
.msg-text del { opacity: 0.6; }

.date-div {
  text-align: center;
  margin: 16px 0 8px;
  font-size: 11px;
  color: var(--t3);
  font-family: var(--mono);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
}
.date-div::before, .date-div::after { content: ''; flex: 1; height: 1px; background: var(--c6); }

.reply-ref {
  font-size: 12px;
  color: var(--t2);
  margin-bottom: 3px;
  padding-left: 8px;
  border-left: 2px solid var(--c6);
  cursor: pointer;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.reply-ref:hover { color: var(--t1); }
.reply-ref strong { color: var(--t1); }

/* Message actions */
.msg-acts {
  opacity: 0;
  display: flex;
  gap: 2px;
  background: var(--c2);
  border: 1px solid var(--c6);
  border-radius: var(--r6);
  padding: 2px;
  position: absolute;
  right: 16px;
  margin-top: -4px;
}
.msg-group { position: relative; }
.act {
  padding: 4px 8px;
  border-radius: var(--r4);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--mono);
  color: var(--t2);
  background: none;
  border: none;
  cursor: pointer;
}
.act:hover { background: var(--c5); color: var(--t0); }
.act.danger:hover { background: rgba(218,55,60,0.2); color: var(--red); }

/* Attachments */
.att-img {
  max-width: 400px;
  max-height: 280px;
  border-radius: var(--r6);
  margin-top: 6px;
  cursor: pointer;
  border: 1px solid var(--c6);
}
.att-file {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--c2);
  border: 1px solid var(--c6);
  border-radius: var(--r6);
  padding: 10px 14px;
  margin-top: 6px;
  cursor: pointer;
}
.att-file:hover { border-color: var(--acc); }
.att-file-name { font-weight: 600; font-size: 13px; }
.att-file-size { font-size: 11px; color: var(--t2); font-family: var(--mono); }

/* Input area */
#input-area {
  padding: 8px 16px 16px;
  flex-shrink: 0;
}
#reply-bar {
  display: none;
  align-items: center;
  gap: 8px;
  background: var(--c4);
  border-radius: var(--r6) var(--r6) 0 0;
  border: 1px solid var(--c6);
  border-bottom: none;
  padding: 6px 12px;
  font-size: 13px;
  color: var(--t2);
}
#reply-bar.show { display: flex; }
#reply-who { color: var(--acc); font-weight: 600; }
#reply-cancel { margin-left: auto; cursor: pointer; }
#reply-cancel:hover { color: var(--t0); }
#att-bar {
  display: none;
  gap: 8px;
  flex-wrap: wrap;
  padding: 8px;
  background: var(--c4);
  border: 1px solid var(--c6);
  border-bottom: none;
}
#att-bar.show { display: flex; }
.att-thumb {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--c2);
  border-radius: var(--r6);
  padding: 4px 8px;
  font-size: 12px;
}
.att-thumb img { width: 32px; height: 32px; object-fit: cover; border-radius: var(--r4); }
.att-rm { position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; background: var(--red); border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; }
#input-box {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  background: var(--c4);
  border: 1px solid var(--c6);
  border-radius: var(--r8);
  padding: 4px 4px 4px 12px;
}
#reply-bar.show + #input-box,
#reply-bar.show ~ #att-bar.show + #input-box { border-top-left-radius: 0; border-top-right-radius: 0; }
#att-bar.show + #input-box { border-top-left-radius: 0; border-top-right-radius: 0; }
#msg-inp {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--t0);
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  max-height: 160px;
  padding: 6px 0;
}
#msg-inp::placeholder { color: var(--t3); }
.inp-btn { padding: 6px 8px; border-radius: var(--r4); color: var(--t2); font-size: 16px; }
.inp-btn:hover { color: var(--t0); background: var(--c5); }

/* Bot bar */
#bot-bar {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 8px 16px 4px;
  flex-shrink: 0;
}
#bot-bar.show { display: flex; }
.bot-chip {
  padding: 3px 10px;
  border-radius: var(--r4);
  font-size: 11px;
  font-weight: 700;
  font-family: var(--mono);
  background: var(--c4);
  color: var(--t2);
  border: 1px solid var(--c6);
  cursor: pointer;
  text-transform: uppercase;
}
.bot-chip:hover { border-color: var(--acc); color: var(--t0); }
.bot-chip.on    { background: var(--acc); color: #fff; border-color: var(--acc); }
.bot-label { font-size: 11px; color: var(--t3); font-family: var(--mono); margin-right: 4px; }
.bot-clear { margin-left: auto; font-size: 11px; color: var(--t3); cursor: pointer; }
.bot-clear:hover { color: var(--red); }

/* Thinking dots */
.think { display: flex; gap: 5px; padding: 4px 0; }
.think span { width: 6px; height: 6px; border-radius: 50%; background: var(--t2); animation: blink 1.2s ease infinite; }
.think span:nth-child(2) { animation-delay: 0.2s; }
.think span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,100% { opacity: 0.3 } 50% { opacity: 1 } }

/* Members panel */
.mb-cat { font-size: 11px; font-weight: 600; color: var(--t2); text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 4px 4px; }
.mb-row { display: flex; align-items: center; gap: 10px; padding: 4px 6px; border-radius: var(--r4); cursor: pointer; }
.mb-row:hover { background: var(--c5); }
.mb-name { font-size: 13px; font-weight: 500; }
.mb-sub  { font-size: 11px; color: var(--t3); font-family: var(--mono); }

/* Scroll to bottom */
#stb {
  display: none;
  position: absolute;
  bottom: 16px;
  right: 16px;
  background: var(--acc);
  color: #fff;
  border-radius: 50%;
  width: 36px;
  height: 36px;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  box-shadow: 0 4px 12px rgba(0,0,0,.5);
}
#stb.show { display: flex; }

/* Modals */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
  padding: 24px;
  animation: fadein 0.1s ease;
}
.modal {
  background: var(--c2);
  border: 1px solid var(--c6);
  border-radius: var(--r8);
  padding: 24px;
  width: 100%;
  max-width: 440px;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideup 0.15s ease;
}
.modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-weight: 700; font-size: 17px; }
.modal-sep { height: 1px; background: var(--c6); margin: 16px 0; }

/* Context menu */
.ctx {
  position: fixed;
  background: var(--c0);
  border: 1px solid var(--c6);
  border-radius: var(--r6);
  padding: 4px;
  min-width: 160px;
  z-index: 9999;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  animation: fadein 0.1s ease;
}
.ctx-item { padding: 7px 12px; border-radius: var(--r4); font-size: 13px; cursor: pointer; color: var(--t1); }
.ctx-item:hover { background: var(--c5); color: var(--t0); }
.ctx-item.danger:hover { background: rgba(218,55,60,0.15); color: var(--red); }
.ctx-sep { height: 1px; background: var(--c6); margin: 4px 0; }

/* Lightbox */
#lbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.9);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
#lbox.show { display: flex; }
#lbox img { max-width: 90vw; max-height: 90vh; border-radius: var(--r6); }

/* Toast */
#toast-root { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 99999; }
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--r6);
  font-size: 13px;
  font-weight: 500;
  background: var(--c2);
  border: 1px solid var(--c6);
  animation: slideup 0.2s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
  max-width: 320px;
}
.toast.success { border-color: var(--green); }
.toast.error   { border-color: var(--red); }
.toast.warn    { border-color: var(--gold); }
.toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.toast.success .toast-dot { background: var(--green); }
.toast.error   .toast-dot { background: var(--red); }
.toast.warn    .toast-dot { background: var(--gold); }
.toast.info    .toast-dot { background: var(--acc); }

/* Gate (loading) */
#gate {
  position: fixed;
  inset: 0;
  background: var(--c0);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  flex-direction: column;
  gap: 16px;
  font-family: var(--mono);
  color: var(--t3);
  font-size: 13px;
}
#gate.hide { display: none; }
.spinner {
  width: 28px;
  height: 28px;
  border: 2px solid var(--c6);
  border-top-color: var(--acc);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

/* Channel welcome */
.ch-welcome { padding: 40px 16px; color: var(--t2); }
.ch-welcome-hash { font-size: 56px; font-weight: 800; color: var(--c6); font-family: var(--mono); line-height: 1; margin-bottom: 16px; }
.ch-welcome h2 { font-size: 22px; font-weight: 700; color: var(--t1); margin-bottom: 6px; }
.ch-welcome p  { font-size: 14px; }

/* Unread badge */
.unread-dot { width: 8px; height: 8px; background: var(--t0); border-radius: 50%; margin-left: auto; flex-shrink: 0; }

/* Self panel icons */
.self-ico { font-size: 15px; color: var(--t2); padding: 4px; border-radius: var(--r4); cursor: pointer; }
.self-ico:hover { color: var(--t0); background: var(--c5); }

/* Divider row */
.row-divider { display: flex; gap: 4px; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- Gate -->
<div id="gate"><div class="spinner"></div>TeamQuyTran</div>

<!-- Toast -->
<div id="toast-root"></div>

<!-- Lightbox -->
<div id="lbox" onclick="closeLbox()"><img id="lbox-img" src="" alt=""></div>

<!-- File input -->
<input type="file" id="file-inp" multiple accept="image/*,.pdf,.txt" style="display:none" onchange="onFileSelected(event)">

<!-- Auth page -->
<div id="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-mark">TQ</div>
      <div class="auth-title">TeamQuyTran</div>
      <div class="auth-sub">Nhập mã truy cập để vào</div>
    </div>
    <div id="code-err" class="alert alert-err"></div>
    <div class="field">
      <label class="label">Mã truy cập</label>
      <input class="inp" id="code-inp" placeholder="Nhập code của bạn..."
        onkeydown="if(event.key==='Enter')doCodeLogin()"
        style="font-family:var(--mono);font-size:18px;letter-spacing:0.1em;text-align:center">
    </div>
    <button class="btn btn-primary w-full" id="code-btn" onclick="doCodeLogin()">VÀO CHAT</button>

</div>

<!-- Main App -->
<div id="app">
  <!-- Rail -->
  <div id="rail">
    <div class="rail-btn active" id="home-btn" onclick="goHome()" title="Home">TQ</div>
    <div class="rail-sep"></div>
    <div id="rail-servers"></div>
    <div class="rail-sep"></div>
    <div class="rail-btn" onclick="showCreateServer()" title="Tạo server">+</div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sb-head" onclick="showServerMenu(event)">
      <span class="srv-name" id="srv-name">TeamQuyTran</span>
      <span style="color:var(--t3);font-size:12px">▾</span>
    </div>
    <div id="ch-list"></div>
    <div id="self-panel">
      <div class="av av-32" id="self-av" style="cursor:pointer" onclick="showSettings()"></div>
      <div style="flex:1;min-width:0">
        <div id="self-name" style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
        <div id="self-tag"  style="font-size:11px;color:var(--t2);font-family:var(--mono);cursor:pointer" onclick="showStatusCtx(event)"></div>
      </div>
      <span class="self-ico" onclick="showSettings()" title="Cài đặt">⚙</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Header -->
    <div id="chat-hdr">
      <span id="chat-pre" style="font-family:var(--mono);font-size:18px;color:var(--t2)">#</span>
      <span id="chat-name" style="font-weight:600;font-size:15px"></span>
      <div id="hdr-divider" class="hdr-divider" style="display:none"></div>
      <span id="chat-topic" style="font-size:13px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button class="btn-icon" onclick="toggleMembers()" title="Thành viên">👥</button>
    </div>

    <!-- Welcome -->
    <div id="welcome" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t2);gap:8px">
      <div style="font-size:48px;font-weight:800;font-family:var(--mono);color:var(--c6)">TQ</div>
      <div style="font-size:18px;font-weight:600;color:var(--t1)">TeamQuyTran</div>
      <div style="font-size:13px;font-family:var(--mono)">Chọn kênh để bắt đầu</div>
    </div>

    <!-- Chat view -->
    <div id="chat-view" style="display:none;flex:1;flex-direction:column;min-height:0">
      <div id="msgs-wrap" onscroll="onScroll()">
        <div id="msgs-inner"></div>
        <div id="stb" onclick="scrollBot()">↓</div>

      <!-- Bot bar -->
      <div id="bot-bar">
        <span class="bot-label">MODE:</span>
        <button class="bot-chip on" onclick="setBotMode('cold',this)">Lạnh</button>
        <button class="bot-chip"    onclick="setBotMode('romantic',this)">Lãng mạn</button>
        <button class="bot-chip"    onclick="setBotMode('evil',this)">Ác</button>
        <button class="bot-clear"   onclick="clearBotHist()">✕ Xóa lịch sử</button>
      </div>

      <!-- Input -->
      <div id="input-area">
        <div id="reply-bar">
          <span>Đang trả lời <strong id="reply-who"></strong></span>
          <span id="reply-cancel" onclick="cancelReply()">✕</span>
        </div>
        <div id="att-bar"></div>
        <div id="input-box">
          <button class="inp-btn" onclick="triggerFile()" title="Đính kèm">📎</button>
          <textarea id="msg-inp" rows="1" placeholder="Nhắn tin..." onkeydown="onKey(event)" oninput="growInp(this)"></textarea>
          <button class="inp-btn" onclick="openEmoji()" title="Emoji">😊</button>
          <button class="btn btn-primary btn-sm" onclick="sendMsg()" style="margin:4px">GỬI</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Members -->
  <div id="panel-mb">
    <div id="mb-list"></div>
  </div>
</div>

<script>
'use strict';

/* =================================================================
   CONFIG
   ================================================================= */
const CFG = {
  SUPA_URL:  'https://sfqlaxcxenndevprhmci.supabase.co',
  SUPA_ANON: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmcWxheGN4ZW5uZGV2cHJobWNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMjk5MjMsImV4cCI6MjA3MzYwNTkyM30.lx4FTXvQj7tj7zz8u9gK3bVdaaFPtIC_sWnuxUxcSG8',
  BOT_API:   '/api/bot',
  UPLOAD_API:'/api/upload',
};

/* =================================================================
   SUPABASE
   ================================================================= */
const db = window.supabase.createClient(CFG.SUPA_URL, CFG.SUPA_ANON, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storageKey: 'tqt-v4' }
});

/* =================================================================
   TOAST
   ================================================================= */
const Toast = {
  show(msg, type = 'info', dur = 3500) {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<div class="toast-dot"></div><span>${msg}</span>`;
    document.getElementById('toast-root').appendChild(el);
    setTimeout(() => el.remove(), dur);
  },
  success: (m) => Toast.show(m, 'success'),
  error:   (m) => Toast.show(m, 'error', 5000),
  info:    (m) => Toast.show(m, 'info'),
  warn:    (m) => Toast.show(m, 'warn'),
};

/* =================================================================
   TIME
   ================================================================= */
const Time = {
  fmt(iso) {
    const d = new Date(iso);
    const now = new Date();
    const same = d.toDateString() === now.toDateString();
    return same
      ? d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
      : d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit' }) + ' ' + d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  },
  dateLabel(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return 'Hôm nay';
    if (diff === 1) return 'Hôm qua';
    return d.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }
};

/* =================================================================
   MARKDOWN
   ================================================================= */
const MD = {
  render(t) {
    if (!t) return '';
    let h = t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c.trim()}</code></pre>`);
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/__(.+?)__/g, '<strong>$1</strong>');
    h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
    h = h.replace(/~~(.+?)~~/g, '<del>$1</del>');
    h = h.replace(/^&gt; (.+)/gm, '<blockquote>$1</blockquote>');
    h = h.replace(/\|\|(.+?)\|\|/g, '<span class="spoiler">$1</span>');
    h = h.replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    h = h.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    h = h.replace(/\n/g, '<br>');
    return h;
  }
};

/* =================================================================
   BOT
   ================================================================= */
const Bot = {
  mode: 'cold',
  hist: [],
  setMode(m) { this.mode = m; },
  clearHist() { this.hist = []; },
  async send(content) {
    this.hist.push({ role: 'user', content });
    const sysMsgs = {
      cold:     'Mày là QuýBot của TeamQuyTran. Tính cách lạnh lùng, súc tích. Trả lời tiếng Việt, ngắn gọn.',
      romantic: 'Mày là QuýBot của TeamQuyTran. Lãng mạn, thơ mộng, dùng ẩn dụ đẹp. Trả lời tiếng Việt.',
      evil:     'Mày là QuýBot của TeamQuyTran. Châm biếm sâu cay, hài hước kiểu ác. Trả lời tiếng Việt.',
    };
    let reply;
    try {
      const tok = null; // no Supabase auth session in code-based auth
      const r = await fetch(CFG.BOT_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...(tok ? { 'Authorization': `Bearer ${tok}` } : {}) },
        body: JSON.stringify({ messages: this.hist.slice(-10), mode: this.mode })
      });
      if (!r.ok) throw new Error('proxy failed');
      const d = await r.json();
      reply = d.reply;
    } catch {
      // Direct fallback (GROQ key exposed — keep only for dev)
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer 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' },
        body: JSON.stringify({
          model: 'llama-3.1-8b-instant',
          messages: [{ role: 'system', content: sysMsgs[this.mode] || sysMsgs.cold }, ...this.hist.slice(-10)],
          max_tokens: 1024, temperature: 0.85
        })
      });
      if (!r.ok) throw new Error(`Groq ${r.status}`);
      const d = await r.json();
      reply = d.choices[0].message.content;
    }
    this.hist.push({ role: 'assistant', content: reply });
    return reply;
  }
};

/* =================================================================
   CACHE (in-memory message cache)
   ================================================================= */
const Cache = {
  _data: {},
  get(k) { return this._data[k] || []; },
  set(k, v) { this._data[k] = v; },
  push(k, v) { if (!this._data[k]) this._data[k] = []; this._data[k].push(v); },
  clear(k) { delete this._data[k]; }
};

/* =================================================================
   APP STATE
   ================================================================= */
const App = {
  user: null,
  profile: null,
  server: null,
  channel: null,
  servers: [],
  channels: [],
  members: [],
  pendingAtts: [],
  replyTo: null,
  isBot: false,
  subs: [],
  mbVisible: true,
};

/* =================================================================
   BOOT — Code-based auth, no Supabase Auth
   ================================================================= */
(async () => {
  const saved = localStorage.getItem('tqt-session');
  if (saved) {
    try {
      const sess = JSON.parse(saved);
      const { data: profile, error } = await db.from('profiles').select('*').eq('id', sess.user_id).single();
      if (profile && !profile.is_banned) {
        await loadAppWithProfile(profile);
        return;
      }
    } catch {}
  }
  showAuth();
})();

function showAuth() {
  hideGate();
  document.getElementById('auth-page').classList.add('show');
  setTimeout(() => document.getElementById('code-inp')?.focus(), 100);
}

function hideGate() { document.getElementById('gate').classList.add('hide'); }

function resetApp() {
  App.user = null; App.profile = null; App.server = null; App.channel = null;
  App.subs.forEach(s => s.unsubscribe()); App.subs = [];
  document.getElementById('app').classList.remove('show');
}

/* =================================================================
   SELF PANEL
   ================================================================= */
function renderSelf() {
  const p = App.profile;
  const name = p.display_name || p.username;
  const el = document.getElementById('self-av');
  el.innerHTML = p.avatar_url ? `<img src="${p.avatar_url}">` : name.slice(0, 2).toUpperCase();
  el.style.background = p.avatar_url ? 'none' : '';
  document.getElementById('self-name').textContent = name;
  document.getElementById('self-tag').textContent = `@${p.username} · ${p.status || 'online'}`;
}

/* =================================================================
   AUTH FORMS
   ================================================================= */
/* =================================================================
   AUTH — Code-based login (no email/password)
   - Bảng auth_codes: id, code, user_id (FK profiles.id), created_by, created_at
   - Admin tạo code trong DB, phát cho user
   - Session lưu localStorage key 'tqt-session'
   ================================================================= */

function showAlert(id, msg, isOk = false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = `alert ${isOk ? 'alert-ok' : 'alert-err'} show`;
}

async function doCodeLogin() {
  const code = document.getElementById('code-inp').value.trim().toUpperCase();
  if (!code) { showAlert('code-err', 'Nhập mã truy cập.'); return; }
  const btn = document.getElementById('code-btn');
  btn.disabled = true; btn.textContent = 'ĐANG XÁC NHẬN...';
  try {
    // Tìm code trong DB (dùng service role qua anon — bảng auth_codes có policy public read)
    const { data, error } = await db.from('auth_codes')
      .select('*, profiles(*)')
      .eq('code', code)
      .single();
    if (error || !data) {
      showAlert('code-err', 'Mã không đúng hoặc không tồn tại.');
      return;
    }
    if (!data.profiles) {
      showAlert('code-err', 'Tài khoản không tồn tại. Liên hệ admin.');
      return;
    }
    if (data.profiles.is_banned) {
      showAlert('code-err', `Tài khoản bị khóa: ${data.profiles.ban_reason || 'Vi phạm quy tắc.'}`);
      return;
    }
    // Lưu session vào localStorage
    localStorage.setItem('tqt-session', JSON.stringify({
      user_id: data.user_id,
      code: code,
      logged_in_at: new Date().toISOString()
    }));
    // Load app trực tiếp với profile
    await loadAppWithProfile(data.profiles);
  } catch (e) {
    showAlert('code-err', 'Lỗi: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'VÀO CHAT';
  }
}

async function loadAppWithProfile(profile) {
  App.user = { id: profile.id };
  App.profile = profile;
  hideGate();
  document.getElementById('auth-page').classList.remove('show');
  document.getElementById('app').classList.add('show');
  renderSelf();
  await updateStatus('online');
  window.addEventListener('beforeunload', () => updateStatus('offline'));
  await loadServers();
  subscribePresence();
}

async function updateStatus(st) {
  if (!App.user) return;
  await db.from('profiles').update({ status: st, last_seen: new Date().toISOString() })
    .eq('id', App.user.id);
  if (App.profile) App.profile.status = st;
}

async function doSignOut() {
  await updateStatus('offline');
  localStorage.removeItem('tqt-session');
  App.user = null; App.profile = null;
  App.subs.forEach(s => s.unsubscribe()); App.subs = [];
  document.getElementById('app').classList.remove('show');
  document.getElementById('code-inp').value = '';
  showAlert('code-err', '', false);
  document.getElementById('code-err').classList.remove('show');
  showAuth();
  closeModal();
}

/* =================================================================
   SERVERS
   ================================================================= */
async function loadServers() {
  const { data } = await db.from('server_members')
    .select('role, servers(*)')
    .eq('user_id', App.user.id);
  App.servers = data?.map(d => ({ ...d.servers, my_role: d.role })) || [];
  renderRail();
}

function renderRail() {
  const rail = document.getElementById('rail-servers');
  rail.innerHTML = App.servers.map(s => {
    const abbr = s.name.slice(0, 2).toUpperCase();
    const active = App.server?.id === s.id ? 'active' : '';
    const icon = s.icon_url ? `<img src="${s.icon_url}" alt="${abbr}">` : abbr;
    return `<div class="rail-btn ${active}" id="rail-${s.id}" onclick="selectServer('${s.id}')" title="${s.name}">${icon}</div>`;
  }).join('');
}

async function selectServer(id) {
  const srv = App.servers.find(s => s.id === id);
  if (!srv) return;
  App.server = srv;
  document.getElementById('srv-name').textContent = srv.name;
  document.querySelectorAll('.rail-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`rail-${id}`)?.classList.add('active');
  document.getElementById('home-btn').classList.remove('active');
  await loadChannels(id);
  await loadMembers(id);
}

/* =================================================================
   CHANNELS
   ================================================================= */
async function loadChannels(sid) {
  const { data } = await db.from('channels').select('*').eq('server_id', sid).order('position');
  App.channels = data || [];
  renderChannels();
}

function renderChannels() {
  const text = App.channels.filter(c => c.type === 'text');
  const ann  = App.channels.filter(c => c.type === 'announcement');
  let h = '';
  if (ann.length) {
    h += `<div class="ch-cat">Thông báo</div>`;
    h += ann.map(c => chRow(c, '📢')).join('');
  }
  h += `<div class="ch-cat">Kênh văn bản <span class="ch-cat-add" onclick="showCreateChannel(event)">+</span></div>`;
  h += text.map(c => chRow(c, '#')).join('');
  h += `<div class="ch-cat">Bot</div>`;
  h += `<div class="ch-row" id="ch-bot" onclick="openBot()"><span class="ch-pre">🤖</span><span class="ch-row-name">QuýBot</span></div>`;
  document.getElementById('ch-list').innerHTML = h;
}

function chRow(c, pre) {
  return `<div class="ch-row" id="ch-${c.id}" onclick="selectChannel('${c.id}')">
    <span class="ch-pre" style="font-size:14px">${pre}</span>
    <span class="ch-row-name">${c.name}</span>
  </div>`;
}

async function selectChannel(id) {
  const ch = App.channels.find(c => c.id === id);
  if (!ch) return;
  App.channel = ch; App.isBot = false;
  document.querySelectorAll('.ch-row').forEach(r => r.classList.remove('active'));
  document.getElementById(`ch-${id}`)?.classList.add('active');
  setHeader('#', ch.name, ch.topic || '');
  document.getElementById('bot-bar').classList.remove('show');

async function searchUsers(q) {
  if (!q || q.length < 2) return;
  const { data } = await db.from('profiles').select('*').ilike('username', `%${q}%`).neq('id', App.user.id).limit(5);
  const res = document.getElementById('dm-res');
  if (!data?.length) { res.innerHTML = '<div style="color:var(--t2);font-size:13px">Không tìm thấy</div>'; return; }
  res.innerHTML = data.map(p =>
    `<div class="mb-row" onclick="startDM('${p.id}');closeModal()">
      <div class="av av-32">${p.avatar_url ? `<img src="${p.avatar_url}">` : p.username.slice(0, 2).toUpperCase()}</div>
      <div><div class="mb-name">${p.display_name || p.username}</div><div class="mb-sub">@${p.username}</div></div>
    </div>`
  ).join('');
}

async function startDM(uid) {
  const { data: existing } = await db.from('dm_participants').select('channel_id').eq('user_id', App.user.id);
  for (const dm of existing || []) {
    const { data: other } = await db.from('dm_participants').select('user_id').eq('channel_id', dm.channel_id).eq('user_id', uid).single();
    if (other) {
      const { data: pf } = await db.from('profiles').select('display_name,username').eq('id', uid).single();
      selectDM(dm.channel_id, pf?.display_name || pf?.username || 'DM', uid);
      return;
    }
  }
  const { data: ch } = await db.from('channels').insert({ is_dm: true, name: 'dm' }).select().single();
  await db.from('dm_participants').insert([{ channel_id: ch.id, user_id: App.user.id }, { channel_id: ch.id, user_id: uid }]);
  const { data: pf } = await db.from('profiles').select('display_name,username').eq('id', uid).single();
  selectDM(ch.id, pf?.display_name || pf?.username || 'DM', uid);
  loadDMs();
}

/* =================================================================
   MESSAGES
   ================================================================= */
async function loadMessages(chId) {
  const cached = Cache.get(chId);
  if (cached.length) renderMsgs(cached);
  const { data } = await db.from('messages')
    .select('*, profiles(*), reply:reply_to(id, content, profiles(username, display_name))')
    .eq('channel_id', chId)
    .order('created_at', { ascending: true })
    .limit(60);
  if (data) { Cache.set(chId, data); renderMsgs(data); scrollBot(); }
}

function renderMsgs(msgs) {
  const inner = document.getElementById('msgs-inner');
  if (!msgs.length) {
    inner.innerHTML = `<div class="ch-welcome">
      <div class="ch-welcome-hash">#</div>
      <h2>Bắt đầu cuộc trò chuyện</h2>
      <p>Đây là khởi đầu của kênh này.</p>
    </div>`;
    return;
  }
  let h = '', lastAuthor = null, lastDate = null;
  msgs.forEach((m, i) => {
    const d = new Date(m.created_at).toDateString();
    if (d !== lastDate) {
      h += `<div class="date-div">${Time.dateLabel(m.created_at)}</div>`;
      lastDate = d; lastAuthor = null;
    }
    const diff = i > 0 ? (new Date(m.created_at) - new Date(msgs[i - 1].created_at)) / 1000 : 999;
    const compact = m.author_id === lastAuthor && diff < 300 && !m.reply_to;
    h += buildMsg(m, compact);
    lastAuthor = m.author_id;
  });
  inner.innerHTML = h;
  inner.querySelectorAll('.spoiler').forEach(el => el.addEventListener('click', () => el.classList.toggle('open')));
}

function buildMsg(m, compact = false) {
  const p = m.profiles || {};
  const name = p.display_name || p.username || (m.is_bot ? 'QuýBot' : '?');
  const role = m.is_bot ? 'bot' : (p.role || 'user');
  const isSelf = m.author_id === App.user?.id;
  const canDel = isSelf || ['admin', 'moderator'].includes(App.profile?.role);
  const av = p.avatar_url ? `<img src="${p.avatar_url}" alt="">` : name.slice(0, 2).toUpperCase();

  const replyHtml = m.reply ? `<div class="reply-ref" onclick="scrollToMsg('${m.reply.id}')">
    <strong>${m.reply.profiles?.display_name || m.reply.profiles?.username || '?'}:</strong>
    <span>${(m.reply.content || '').slice(0, 80)}${(m.reply.content?.length || 0) > 80 ? '...' : ''}</span>
  </div>` : '';

  const attsHtml = (m.attachments || []).map(a =>
    a.type === 'image'
      ? `<img class="att-img" src="${a.url}" alt="${a.name}" onclick="openLbox('${a.url}')">`
      : `<div class="att-file" onclick="window.open('${a.url}')">
           <span style="font-size:22px">📄</span>
           <div class="att-file-info"><div class="att-file-name">${a.name}</div><div class="att-file-size">${a.size ? Math.round(a.size / 1024) + 'KB' : 'file'}</div></div>
         </div>`
  ).join('');

  const roleBadge = role !== 'user' ? `<span class="badge badge-${role}">${role === 'bot' ? 'BOT' : role.toUpperCase()}</span>` : '';

  const acts = `<div class="msg-acts">
    <button class="act" onclick="addReaction('${m.id}')" title="React">+</button>
    <button class="act" onclick="setReply('${m.id}','${name.replace(/'/g, "\\'")}')">↩</button>
    ${isSelf  ? `<button class="act" onclick="editMsg('${m.id}')">✎</button>` : ''}
    ${canDel  ? `<button class="act danger" onclick="delMsg('${m.id}')">✕</button>` : ''}
  </div>`;

  return `<div class="msg-group ${compact ? 'compact' : ''}" id="msg-${m.id}" data-id="${m.id}">
    <div class="msg-av"><div class="av av-40" style="cursor:pointer" onclick="showProfile('${p.id || ''}')">${av}</div></div>
    <div class="msg-body">
      ${replyHtml}
      ${!compact ? `<div class="msg-hdr">
        <span class="msg-author ${role}" onclick="showProfile('${p.id || ''}')">${name}</span>
        ${roleBadge}
        <span class="msg-time">${Time.fmt(m.created_at)}</span>
        ${m.edited ? '<span class="msg-edited">(đã sửa)</span>' : ''}
      </div>` : ''}
      <div class="msg-text ${m.type === 'system' ? 'system' : ''}">${MD.render(m.content || '')}</div>
      ${attsHtml ? `<div class="msg-atts">${attsHtml}</div>` : ''}
    </div>
    ${acts}
  </div>`;
}

function appendMsg(m) {
  const inner = document.getElementById('msgs-inner');
  // Remove welcome if present
  const welcome = inner.querySelector('.ch-welcome');
  if (welcome) welcome.remove();
  const t = document.createElement('div');
  t.innerHTML = buildMsg(m, false);
  const el = t.firstElementChild;
  inner.appendChild(el);
  el.querySelectorAll('.spoiler').forEach(s => s.addEventListener('click', () => s.classList.toggle('open')));
  const wrap = document.getElementById('msgs-wrap');
  if (wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 150) scrollBot();
  else document.getElementById('stb').classList.add('show');
  if (App.channel?.id) Cache.push(App.channel.id, m);
}

/* =================================================================
   SEND
   ================================================================= */
async function sendMsg() {
  if (App.isBot) { await sendBotMsg(); return; }
  if (!App.channel) return;
  const inp = document.getElementById('msg-inp');
  const content = inp.value.trim();
  const atts = [...App.pendingAtts];
  if (!content && !atts.length) return;
  inp.value = ''; inp.style.height = 'auto'; clearAtts();
  const payload = {
    channel_id: App.channel.id,
    author_id:  App.user.id,
    content:    content || null,
    type:       'text',
    attachments: atts.map(a => ({ url: a.url, name: a.name, type: a.kind, size: a.size })),
    reply_to:   App.replyTo?.id || null,
  };
  cancelReply();
  appendMsg({ ...payload, id: `opt_${Date.now()}`, created_at: new Date().toISOString(), profiles: App.profile });
  const { error } = await db.from('messages').insert(payload);
  if (error) Toast.error('Gửi thất bại: ' + error.message);
}

async function sendBotMsg() {
  const inp = document.getElementById('msg-inp');
  const content = inp.value.trim();
  if (!content) return;
  inp.value = ''; inp.style.height = 'auto';
  appendMsg({ id: `u_${Date.now()}`, content, created_at: new Date().toISOString(), profiles: App.profile, is_bot: false });
  Cache.push('bot', { id: `u_${Date.now()}`, content, created_at: new Date().toISOString(), profiles: App.profile });
  const tid = `think_${Date.now()}`;
  const el = document.createElement('div');
  el.id = tid; el.className = 'msg-group';
  el.innerHTML = `<div class="msg-av"><div class="av av-40">QB</div></div>
    <div class="msg-body">
      <div class="msg-hdr"><span class="msg-author bot">QuýBot</span><span class="badge badge-bot">BOT</span></div>
      <div class="msg-text"><div class="think"><span></span><span></span><span></span></div></div>
    </div>`;
  document.getElementById('msgs-inner').appendChild(el);
  scrollBot();
  try {
    const reply = await Bot.send(content);
    document.getElementById(tid)?.remove();
    const bm = { id: `b_${Date.now()}`, content: reply, created_at: new Date().toISOString(), profiles: { display_name: 'QuýBot', username: 'quybot', role: 'bot' }, is_bot: true };
    appendMsg(bm); Cache.push('bot', bm);
  } catch (e) {
    document.getElementById(tid)?.remove();
    appendMsg({ id: `e_${Date.now()}`, content: `[Lỗi] ${e.message}`, created_at: new Date().toISOString(), profiles: { display_name: 'QuýBot', username: 'quybot', role: 'bot' }, is_bot: true });
  }
}

/* =================================================================

   ================================================================= */
function triggerFile() { document.getElementById('file-inp').click(); }

async function onFileSelected(e) {
  const allowed = ['image/png', 'image/jpeg', 'image/gif', 'image/webp', 'text/plain', 'application/pdf'];
  for (const file of Array.from(e.target.files)) {
    if (file.size > 8 * 1024 * 1024) { Toast.error(`${file.name}: quá lớn (max 8MB)`); continue; }
    if (!allowed.includes(file.type)) { Toast.error(`${file.name}: không hỗ trợ`); continue; }
    const att = { name: file.name, kind: file.type.startsWith('image/') ? 'image' : 'file', size: file.size, url: '' };
    if (att.kind === 'image') {
      const reader = new FileReader();
      reader.onload = async ev => {
        att.preview = ev.target.result; att.url = ev.target.result;
        try {
          const ext = file.name.split('.').pop();
          const path = `uploads/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
          const { error } = await db.storage.from('attachments').upload(path, file);
          if (!error) {
            const { data: { publicUrl } } = db.storage.from('attachments').getPublicUrl(path);
            att.url = publicUrl;
          }
        } catch {}
        addAttThumb(att);
      };
      reader.readAsDataURL(file);
    } else {
      att.url = URL.createObjectURL(file);
      addAttThumb(att);
    }
    App.pendingAtts.push(att);
  }
  e.target.value = '';
}

function addAttThumb(att) {
  const bar = document.getElementById('att-bar'); bar.classList.add('show');
  const idx = App.pendingAtts.indexOf(att);
  const d = document.createElement('div'); d.className = 'att-thumb'; d.id = `at-${idx}`;
  d.innerHTML = att.kind === 'image'
    ? `<img src="${att.preview || att.url}" alt=""><span>${att.name}</span><button class="att-rm" onclick="removeAtt(${idx})">✕</button>`
    : `<span>📄</span><span>${att.name}</span><button class="att-rm" onclick="removeAtt(${idx})">✕</button>`;
  bar.appendChild(d);
}

function removeAtt(idx) {
  App.pendingAtts.splice(idx, 1);
  document.getElementById(`at-${idx}`)?.remove();
  if (!App.pendingAtts.length) document.getElementById('att-bar').classList.remove('show');
}
function clearAtts() {
  App.pendingAtts = [];
  const b = document.getElementById('att-bar'); b.innerHTML = ''; b.classList.remove('show');
}

function addReaction(id) {

/* =================================================================
   REALTIME
   ================================================================= */
function subChannel(chId) {
  App.subs.forEach(s => s.unsubscribe()); App.subs = [];
  const sub = db.channel(`ch_${chId}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `channel_id=eq.${chId}` }, async payload => {
      const { data } = await db.from('messages')
        .select('*, profiles(*), reply:reply_to(id, content, profiles(username, display_name))')
        .eq('id', payload.new.id).single();
      if (data && data.author_id !== App.user.id) appendMsg(data);
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages', filter: `channel_id=eq.${chId}` }, payload => {
      document.getElementById(`msg-${payload.old.id}`)?.remove();
    })
    .subscribe();
  App.subs.push(sub);
}

function subscribePresence() {
  db.channel('presence_profiles')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles' }, payload => {
      const m = App.members.find(x => x.user_id === payload.new.id);
      if (m) { m.profiles = { ...m.profiles, ...payload.new }; renderMembers(); }
    })
    .subscribe();
}

  const p = App.profile;
  showModal(`
    <div class="modal-hdr"><span class="modal-title">Cài đặt tài khoản</span><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="field"><label class="label">Tên hiển thị</label><input class="inp" id="s-name" value="${p?.display_name || ''}"></div>
    <div class="field"><label class="label">Bio</label><input class="inp" id="s-bio" value="${p?.bio || ''}" placeholder="Giới thiệu bản thân..."></div>
    ${p?.role === 'admin' ? `<div class="modal-sep"></div><button class="btn btn-ghost w-full" onclick="showAdminPanel()">⚙ Admin Panel</button>` : ''}
    <div class="modal-sep"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveSettings()">LƯU</button>
      <button class="btn btn-danger" onclick="doSignOut()">ĐĂNG XUẤT</button>
    </div>`);
}

async function saveSettings() {
  const name = document.getElementById('s-name').value.trim();
  const bio  = document.getElementById('s-bio').value.trim();
  const { error } = await db.from('profiles').update({ display_name: name, bio }).eq('id', App.user.id);
  if (error) { Toast.error('Lưu thất bại'); return; }
  App.profile.display_name = name; App.profile.bio = bio;
  renderSelf(); closeModal(); Toast.success('Đã lưu!');
}

function showProfile(uid) {
  if (!uid || uid === 'undefined') return;
  const m = App.members.find(x => x.user_id === uid);
  const p = m?.profiles || (uid === App.user?.id ? App.profile : null);
  if (!p) return;
  const name = p.display_name || p.username;
  const av = p.avatar_url ? `<img src="${p.avatar_url}" style="width:72px;height:72px;border-radius:50%;object-fit:cover">` : `<div class="av av-72" style="margin:0 auto">${name.slice(0, 2).toUpperCase()}</div>`;
  showModal(`
    <div style="text-align:center;padding:8px 0 16px">
      ${av}
      <div style="font-size:20px;font-weight:700;margin-top:12px">${name}</div>
      <div style="font-size:12px;color:var(--t2);font-family:var(--mono)">@${p.username}</div>
      ${p.bio ? `<p style="margin-top:10px;font-size:13px;color:var(--t1)">${p.bio}</p>` : ''}
      <div style="margin-top:10px">${p.role && p.role !== 'user' ? `<span class="badge badge-${p.role}">${p.role.toUpperCase()}</span>` : ''}</div>
    </div>
    ${uid !== App.user?.id ? `<div style="display:flex;justify-content:center">
      <button class="btn btn-primary btn-sm" onclick="startDM('${uid}');closeModal()">💬 Nhắn tin</button>
    </div>` : ''}`);
}

/* =================================================================
   STATUS
   ================================================================= */
function showStatusCtx(e) {
  e.stopPropagation();
  const opts = [['online', '🟢 Online'], ['idle', '🟡 Vắng mặt'], ['dnd', '🔴 Không làm phiền'], ['offline', '⚫ Ẩn danh']];
  const m = document.createElement('div'); m.className = 'ctx';
  m.style.cssText = 'position:fixed;bottom:60px;left:80px;z-index:3000;';
  m.innerHTML = opts.map(([val, lbl]) =>
    `<div class="ctx-item" onclick="setStatus('${val}');this.closest('.ctx').remove()">${lbl}</div>`
  ).join('');
  document.body.appendChild(m);
  setTimeout(() => document.addEventListener('click', () => m.remove(), { once: true }), 0);
}

async function setStatus(st) { await updateStatus(st); renderSelf(); }

/* =================================================================
   SERVER MANAGEMENT
   ================================================================= */
function showServerMenu(e) {
  e.stopPropagation();
  if (!App.server) return;
  const isAdmin = App.server.my_role === 'admin' || App.profile?.role === 'admin';
  const m = document.createElement('div'); m.className = 'ctx';
  m.style.cssText = 'position:fixed;top:52px;left:80px;z-index:3000;';
  m.innerHTML = `
    ${isAdmin ? `<div class="ctx-item" onclick="showCreateChannel(event);this.closest('.ctx').remove()">Tạo kênh mới</div>
    <div class="ctx-sep"></div>` : ''}
    <div class="ctx-item danger" onclick="leaveServer();this.closest('.ctx').remove()">Rời server</div>`;
  document.body.appendChild(m);
  setTimeout(() => document.addEventListener('click', () => m.remove(), { once: true }), 0);
}

function showCreateChannel(e) {
  e?.stopPropagation();
  if (!App.server) return;
  showModal(`
    <div class="modal-hdr"><span class="modal-title">Tạo kênh mới</span><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="field"><label class="label">Tên kênh</label><input class="inp" id="nc-name" placeholder="ten-kenh"></div>
    <div class="field"><label class="label">Loại</label>
      <select class="inp" id="nc-type"><option value="text">Văn bản</option><option value="announcement">Thông báo</option></select>
    </div>
    <button class="btn btn-primary w-full" onclick="createChannel()">TẠO KÊNH</button>`);
}

async function createChannel() {
  const n = document.getElementById('nc-name').value.trim().toLowerCase().replace(/\s+/g, '-');
  const t = document.getElementById('nc-type').value;
  if (!n) return;
  const { error } = await db.from('channels').insert({ server_id: App.server.id, name: n, type: t });
  if (error) { Toast.error('Không tạo được kênh'); return; }
  closeModal(); await loadChannels(App.server.id); Toast.success(`Kênh #${n} đã tạo!`);
}

function showCreateServer() {
  showModal(`
    <div class="modal-hdr"><span class="modal-title">Tạo server mới</span><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="field"><label class="label">Tên server</label><input class="inp" id="ns-name" placeholder="Server của tôi"></div>
    <div class="field"><label class="label">Mô tả</label><input class="inp" id="ns-desc" placeholder="Mô tả ngắn..."></div>
    <button class="btn btn-primary w-full" onclick="createServer()">TẠO SERVER</button>`);
}

async function createServer() {
  const n = document.getElementById('ns-name').value.trim();
  if (!n) { Toast.error('Nhập tên server'); return; }
  const { data: srv, error } = await db.from('servers')
    .insert({ name: n, description: document.getElementById('ns-desc').value.trim(), owner_id: App.user.id })
    .select().single();
  if (error) { Toast.error('Lỗi tạo server'); return; }
  await db.from('server_members').insert({ server_id: srv.id, user_id: App.user.id, role: 'admin' });
  await db.from('channels').insert([
    { server_id: srv.id, name: 'general', type: 'text', position: 0 },
    { server_id: srv.id, name: 'thong-bao', type: 'announcement', position: 1 },
  ]);
  closeModal(); await loadServers(); Toast.success(`Server "${n}" đã tạo!`);
}

async function leaveServer() {
  if (!App.server || !confirm(`Rời server "${App.server.name}"?`)) return;
  await db.from('server_members').delete().eq('server_id', App.server.id).eq('user_id', App.user.id);
  await loadServers(); goHome(); Toast.info('Đã rời server');
}

/* =================================================================
   ADMIN PANEL
   ================================================================= */
async function showAdminPanel() {
  const { data } = await db.from('signup_requests').select('*').eq('status', 'pending').order('created_at');
  showModal(`
    <div class="modal-hdr"><span class="modal-title">Yêu cầu đăng ký (${data?.length || 0})</span><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div style="max-height:400px;overflow-y:auto">
      ${!data?.length ? '<div style="color:var(--t2);font-size:13px">Không có yêu cầu nào</div>' :
        data.map(r => `<div style="background:var(--c1);border-radius:var(--r6);padding:12px;margin-bottom:8px;border:1px solid var(--c6)">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <div><div style="font-weight:600;font-family:var(--mono)">@${r.username}</div><div style="font-size:12px;color:var(--t2)">${r.email}</div></div>
            <div style="font-size:11px;color:var(--t3);font-family:var(--mono)">${Time.fmt(r.created_at)}</div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="approveReq('${r.id}','${r.email}','${r.username}')">DUYỆT</button>
            <button class="btn btn-danger btn-sm"  onclick="rejectReq('${r.id}')">TỪ CHỐI</button>
          </div>
        </div>`).join('')}
    </div>`);
}

async function approveReq(id, email, username) {
  try {
    const tok = null; // no Supabase auth session
    const r = await fetch('/api/approve-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tok}` },
      body: JSON.stringify({ requestId: id })
    });
    if (r.ok) { Toast.success(`Đã duyệt @${username}`); showAdminPanel(); return; }
  } catch {}
  await db.from('signup_requests').update({ status: 'approved', reviewed_by: App.user.id, reviewed_at: new Date().toISOString() }).eq('id', id);
  Toast.info(`Tạo user trong Supabase Auth với email: ${email}`);
  showAdminPanel();
}

async function rejectReq(id) {
  const reason = prompt('Lý do từ chối:') || 'Không phù hợp';
  await db.from('signup_requests').update({ status: 'rejected', reviewed_by: App.user.id, reviewed_at: new Date().toISOString(), reject_reason: reason }).eq('id', id);
  Toast.info('Đã từ chối'); showAdminPanel();
}
</script>
</body>
</html>
