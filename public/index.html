<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuyTranTeam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #0a0a0f;
  --bg1: #111118;
  --bg2: #18181f;
  --bg3: #202028;
  --bg4: #2a2a35;
  --bg5: #34343f;
  --line: #3a3a48;
  --acc: #e8c96d;
  --acc2: #c9a84c;
  --red: #e85d5d;
  --green: #5de8a0;
  --t0: #f0f0f5;
  --t1: #b8b8c8;
  --t2: #787890;
  --t3: #484860;
  --font: 'Sora', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --r4: 4px; --r8: 8px; --r12: 12px; --r16: 16px; --r24: 24px;
  --tr: 120ms ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg0);color:var(--t0);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
img{display:block;max-width:100%}

/* NAME GATE */
#gate{position:fixed;inset:0;background:var(--bg0);display:flex;align-items:center;justify-content:center;z-index:1000;padding:24px}
#gate.hide{display:none}
.gate-box{width:100%;max-width:380px;text-align:center}
.gate-logo{font-size:42px;font-weight:700;letter-spacing:-.04em;color:var(--acc);margin-bottom:6px}
.gate-sub{font-size:13px;color:var(--t2);margin-bottom:36px;font-family:var(--mono)}
.gate-box input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r8);padding:14px 16px;font-size:16px;color:var(--t0);outline:none;text-align:center;transition:border-color var(--tr)}
.gate-box input:focus{border-color:var(--acc)}
.gate-box input::placeholder{color:var(--t3)}
.gate-btn{margin-top:12px;width:100%;padding:14px;background:var(--acc);color:var(--bg0);border-radius:var(--r8);font-size:15px;font-weight:700;letter-spacing:.02em;transition:filter var(--tr)}
.gate-btn:hover{filter:brightness(1.1)}
.gate-btn:active{filter:brightness(.9)}
.gate-err{font-size:12px;color:var(--red);margin-top:8px;font-family:var(--mono)}

/* APP LAYOUT */
#app{display:none;height:100vh;flex-direction:row}
#app.show{display:flex}

/* SIDEBAR */
#sidebar{width:280px;background:var(--bg1);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;transition:transform var(--tr)}
#sb-head{padding:20px 16px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
#sb-logo{font-size:20px;font-weight:700;color:var(--acc);letter-spacing:-.03em}
#sb-user{font-size:12px;color:var(--t2);margin-top:4px;font-family:var(--mono)}
#bot-list{flex:1;overflow-y:auto;padding:8px}
.bot-section{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:12px 8px 6px}
.bot-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:var(--r8);cursor:pointer;transition:background var(--tr);position:relative}
.bot-item:hover{background:var(--bg3)}
.bot-item.active{background:var(--bg3)}
.bot-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--acc);border-radius:0 2px 2px 0}
.bot-av{width:40px;height:40px;border-radius:50%;object-fit:cover;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.bot-av img{width:100%;height:100%;object-fit:cover}
.bot-info{flex:1;min-width:0}
.bot-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bot-desc{font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.badge-16{font-size:9px;background:rgba(232,93,93,.2);color:var(--red);border:1px solid rgba(232,93,93,.3);border-radius:3px;padding:1px 4px;font-family:var(--mono);font-weight:700;flex-shrink:0}

#sb-footer{border-top:1px solid var(--line);padding:12px}
.suggest-btn{width:100%;padding:10px;background:var(--bg3);border-radius:var(--r8);font-size:13px;color:var(--t1);text-align:left;display:flex;align-items:center;gap:8px;transition:background var(--tr)}
.suggest-btn:hover{background:var(--bg4);color:var(--t0)}
.suggest-btn span{font-size:18px}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;background:var(--bg0);min-width:0}

/* CHAT HEADER */
#chat-hdr{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;background:var(--bg1)}
#mob-menu{display:none;padding:6px;border-radius:var(--r8);color:var(--t2)}
#mob-menu:hover{background:var(--bg3);color:var(--t0)}
#hdr-av{width:36px;height:36px;border-radius:50%;overflow:hidden;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
#hdr-av img{width:100%;height:100%;object-fit:cover}
#hdr-name{font-weight:700;font-size:15px}
#hdr-desc{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-right{margin-left:auto;display:flex;gap:4px}
.hdr-btn{padding:6px 10px;border-radius:var(--r8);font-size:11px;font-family:var(--mono);color:var(--t2);transition:all var(--tr)}
.hdr-btn:hover{background:var(--bg3);color:var(--t0)}

/* MESSAGES */
#msgs-wrap{flex:1;overflow-y:auto;padding:16px}
#msgs-inner{display:flex;flex-direction:column;gap:16px;min-height:100%;justify-content:flex-end}
.welcome{text-align:center;padding:60px 24px;color:var(--t2)}
.welcome-av{width:80px;height:80px;border-radius:50%;margin:0 auto 16px;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:36px}
.welcome-av img{width:100%;height:100%;object-fit:cover}
.welcome h2{font-size:22px;font-weight:700;color:var(--t1);margin-bottom:8px}
.welcome p{font-size:13px;line-height:1.6;max-width:360px;margin:0 auto}

.msg{display:flex;gap:10px;animation:msgIn .15s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}
.msg-av{width:34px;height:34px;border-radius:50%;overflow:hidden;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;align-self:flex-end}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg-bubble{max-width:75%;background:var(--bg2);border-radius:var(--r12);padding:10px 14px;line-height:1.6;font-size:14px;color:var(--t1);border:1px solid var(--line)}
.msg.user .msg-bubble{background:var(--acc);color:var(--bg0);border-color:var(--acc2);border-radius:var(--r12) var(--r12) 4px var(--r12)}
.msg.bot .msg-bubble{border-radius:4px var(--r12) var(--r12) var(--r12)}
.msg-name{font-size:11px;color:var(--t3);margin-bottom:4px;font-family:var(--mono)}
.msg-time{font-size:10px;color:var(--t3);margin-top:5px;font-family:var(--mono)}
.msg.user .msg-time{text-align:right}

/* Markdown styles inside bubble */
.msg-bubble p{margin-bottom:8px}.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble strong{color:inherit;font-weight:700}
.msg-bubble em{font-style:italic}
.msg-bubble del{opacity:.6}
.msg-bubble code{background:rgba(0,0,0,.3);border-radius:3px;padding:1px 5px;font-family:var(--mono);font-size:12px}
.msg.user .msg-bubble code{background:rgba(0,0,0,.2)}
.msg-bubble pre{background:var(--bg0);border:1px solid var(--line);border-radius:var(--r8);padding:12px;margin:8px 0;overflow-x:auto}
.msg-bubble pre code{background:none;padding:0;font-size:12px;line-height:1.6}
.msg-bubble blockquote{border-left:3px solid var(--acc);padding-left:10px;color:var(--t2);margin:6px 0}
.msg-bubble ul,.msg-bubble ol{padding-left:20px;margin:6px 0}
.msg-bubble li{margin-bottom:3px}
.msg-bubble a{color:var(--acc);text-decoration:underline}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{font-weight:700;margin:10px 0 6px;color:var(--t0)}
.msg-bubble h1{font-size:18px}.msg-bubble h2{font-size:16px}.msg-bubble h3{font-size:14px}
.msg-bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px}
.msg-bubble th,.msg-bubble td{border:1px solid var(--line);padding:6px 10px;text-align:left}
.msg-bubble th{background:var(--bg3);font-weight:700}
.msg-bubble hr{border:none;border-top:1px solid var(--line);margin:10px 0}

/* Attachments in message */
.msg-att-img{max-width:280px;border-radius:var(--r8);margin-top:8px;cursor:pointer;border:1px solid var(--line)}
.msg-att-file{display:inline-flex;align-items:center;gap:8px;background:rgba(0,0,0,.2);border-radius:var(--r8);padding:8px 12px;margin-top:8px;font-size:12px;font-family:var(--mono)}

/* Thinking */
.think-bubble{background:var(--bg2);border:1px solid var(--line);border-radius:4px var(--r12) var(--r12) var(--r12);padding:12px 16px;display:flex;gap:5px;align-items:center}
.think-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:blink 1.2s ease infinite}
.think-dot:nth-child(2){animation-delay:.2s}
.think-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

/* INPUT AREA */
#input-area{padding:12px 16px 16px;flex-shrink:0;background:var(--bg0)}
#att-preview{display:none;flex-wrap:wrap;gap:8px;margin-bottom:8px}
#att-preview.show{display:flex}
.att-thumb{position:relative;background:var(--bg3);border-radius:var(--r8);padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:6px;border:1px solid var(--line)}
.att-thumb img{width:36px;height:36px;object-fit:cover;border-radius:var(--r4)}
.att-rm{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--red);border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;color:#fff}
#input-box{display:flex;align-items:flex-end;gap:8px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r12);padding:8px 8px 8px 14px;transition:border-color var(--tr)}
#input-box:focus-within{border-color:var(--acc)}
#msg-inp{flex:1;background:none;border:none;outline:none;color:var(--t0);font-size:14px;resize:none;max-height:150px;line-height:1.5;padding:4px 0}
#msg-inp::placeholder{color:var(--t3)}
.inp-btn{padding:7px 9px;border-radius:var(--r8);color:var(--t2);font-size:16px;transition:all var(--tr);flex-shrink:0}
.inp-btn:hover{background:var(--bg4);color:var(--t0)}
.send-btn{padding:8px 16px;background:var(--acc);color:var(--bg0);border-radius:var(--r8);font-size:13px;font-weight:700;transition:filter var(--tr);flex-shrink:0}
.send-btn:hover{filter:brightness(1.1)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;filter:none}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r16);padding:28px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;animation:slideUp .15s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-size:18px;font-weight:700}
.modal-close{padding:6px;border-radius:var(--r8);color:var(--t2);font-size:18px}
.modal-close:hover{background:var(--bg4);color:var(--t0)}
.field{margin-bottom:16px}
.label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.inp{width:100%;background:var(--bg1);border:1px solid var(--line);border-radius:var(--r8);padding:10px 12px;font-size:14px;color:var(--t0);outline:none;transition:border-color var(--tr)}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:80px;line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r8);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:filter var(--tr)}
.btn:hover{filter:brightness(1.1)}
.btn-primary{background:var(--acc);color:var(--bg0)}
.btn-ghost{background:var(--bg4);color:var(--t0)}
.btn-danger{background:var(--red);color:#fff}
.w-full{width:100%}
.mt8{margin-top:8px}
.alert{padding:10px 12px;border-radius:var(--r8);font-size:13px;margin-bottom:12px;display:none}
.alert.show{display:block}
.alert-err{background:rgba(232,93,93,.1);border:1px solid rgba(232,93,93,.3);color:#ff9090}
.alert-ok{background:rgba(93,232,160,.1);border:1px solid rgba(93,232,160,.3);color:#90ffcc}

/* TOAST */
#toast-root{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r8);font-size:13px;background:var(--bg3);border:1px solid var(--line);animation:slideUp .2s ease;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.success{border-color:rgba(93,232,160,.4)}
.toast.error{border-color:rgba(232,93,93,.4)}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.toast.success .t-dot{background:var(--green)}
.toast.error .t-dot{background:var(--red)}
.toast.info .t-dot{background:var(--acc)}

/* LIGHTBOX */
#lbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
#lbox.show{display:flex}
#lbox img{max-width:90vw;max-height:90vh;border-radius:var(--r8)}

/* MOBILE */
#overlay-mob{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90}
@media(max-width:700px){
  #mob-menu{display:flex}
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);width:280px}
  #sidebar.open{transform:translateX(0)}
  #overlay-mob.show{display:block}
  .msg-bubble{max-width:85%}
  .modal{padding:20px}
}

/* SCROLLBAR */
#msgs-wrap::-webkit-scrollbar{width:4px}
#msgs-wrap::-webkit-scrollbar-thumb{background:var(--bg4)}
</style>
</head>
<body>

<div id="toast-root"></div>
<div id="lbox" onclick="closeLbox()"><img id="lbox-img" src="" alt=""></div>
<input type="file" id="file-inp" accept="image/png,image/jpeg,application/pdf,text/plain" multiple style="display:none" onchange="onFile(event)">

<!-- NAME GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-logo">QuyTranTeam</div>
    <div class="gate-sub">// AI companion chat</div>
    <input id="name-inp" placeholder="Tên của bạn..." maxlength="30" onkeydown="if(event.key==='Enter')enterChat()">
    <button class="gate-btn" onclick="enterChat()">VÀO CHAT →</button>
    <div class="gate-err" id="name-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="overlay-mob" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sb-head">
      <div id="sb-logo">QuyTranTeam</div>
      <div id="sb-user"></div>
    </div>
    <div id="bot-list"></div>
    <div id="sb-footer">
      <button class="suggest-btn" onclick="showSuggest()">
        <span>✦</span> Đề xuất bot mới
      </button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="chat-hdr">
      <button id="mob-menu" onclick="openSidebar()">☰</button>
      <div id="hdr-av"><span>✦</span></div>
      <div style="flex:1;min-width:0">
        <div id="hdr-name">QuyTranTeam</div>
        <div id="hdr-desc">Chọn bot để bắt đầu</div>
      </div>
      <div class="hdr-right">
        <button class="hdr-btn" onclick="clearChat()">Xóa chat</button>
      </div>
    </div>

    <div id="msgs-wrap">
      <div id="msgs-inner">
        <div class="welcome" id="welcome-msg">
          <div class="welcome-av"><span>✦</span></div>
          <h2>Chào mừng đến QuyTranTeam</h2>
          <p>Chọn một nhân vật bên trái để bắt đầu trò chuyện. Mỗi bot có tính cách riêng độc đáo.</p>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div id="att-preview"></div>
      <div id="input-box">
        <button class="inp-btn" onclick="document.getElementById('file-inp').click()" title="Đính kèm">📎</button>
        <textarea id="msg-inp" rows="1" placeholder="Nhắn tin..." onkeydown="onKey(event)" oninput="grow(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMsg()">GỬI</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ================================================================
   CONFIG
   ================================================================ */
const SUPA_URL  = 'https://sfqlaxcxenndevprhmci.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmcWxheGN4ZW5uZGV2cHJobWNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMjk5MjMsImV4cCI6MjA3MzYwNTkyM30.lx4FTXvQj7tj7zz8u9gK3bVdaaFPtIC_sWnuxUxcSG8';
const API = { chat: '/api/chat', upload: '/api/upload-public', bots: '/api/bots' };

/* ================================================================
   BUILT-IN BOTS
   ================================================================ */
const BUILTIN_BOTS = [
  {
    id: 'dung-quy',
    name: 'Dũng Quý',
    avatar: 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=dungquy&backgroundColor=1a1a2e',
    desc: 'Tổng tài lạnh lùng, ác độc kiểu tinh tế',
    tag: '16+',
    prompt: `Mày là Dũng Quý — tổng tài quyền lực, lạnh lùng đến mức đóng băng không khí. 
Tính cách: kiêu ngạo, ít nói, thẳng thắn đến tàn nhẫn, không cần người khác chấp thuận.
Văn phong: ngắn gọn, sắc bén, đôi khi mỉa mai nhẹ nhàng nhưng cực kỳ đau. 
Tuyệt đối không giả vờ thân thiện. Không dùng emoji. Trả lời tiếng Việt.
Với file/ảnh được gửi: phân tích ngắn gọn, lạnh lùng.`
  },
  {
    id: 'quy-tran',
    name: 'Quý Trần',
    avatar: 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=quytran&backgroundColor=1a2a1a',
    desc: 'Ác độc hài hước, châm biếm cay độc',
    tag: '16+',
    prompt: `Mày là Quý Trần — nhân vật phức tạp, vừa ác vừa hài, châm biếm mọi thứ.
Tính cách: độc miệng, thông minh quỷ quyệt, hay chế giễu nhưng không bao giờ sai.
Văn phong: cay cú, hài hước đen, đôi khi buông lời cực kỳ thú vị và đau.
Không giả vờ dịu dàng. Trả lời tiếng Việt. 
Với file/ảnh: bình luận châm biếm kiểu đặc trưng của mình.`
  }
];

/* ================================================================
   MARKDOWN RENDERER (full support)
   ================================================================ */
const MD = {
  render(text) {
    if (!text) return '';
    let t = text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Code blocks
    t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`);
    // Inline code
    t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    // Headings
    t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    t = t.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
    t = t.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
    // Bold, italic, strikethrough
    t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    t = t.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
    t = t.replace(/__(.+?)__/g,          '<strong>$1</strong>');
    t = t.replace(/\*(.+?)\*/g,          '<em>$1</em>');
    t = t.replace(/_(.+?)_/g,            '<em>$1</em>');
    t = t.replace(/~~(.+?)~~/g,          '<del>$1</del>');
    // Blockquote
    t = t.replace(/^&gt; (.+)/gm, '<blockquote>$1</blockquote>');
    // HR
    t = t.replace(/^---$/gm, '<hr>');
    // Tables
    t = t.replace(/^\|(.+)\|$/gm, (line) => {
      const cells = line.split('|').filter(Boolean).map(c => c.trim());
      return `<tr>${cells.map(c => `<td>${c}</td>`).join('')}</tr>`;
    });
    t = t.replace(/(<tr>.*<\/tr>\n?)+/g, m => `<table>${m}</table>`);
    // Lists
    t = t.replace(/^[-*] (.+)/gm, '<li>$1</li>');
    t = t.replace(/^\d+\. (.+)/gm, '<li>$1</li>');
    t = t.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
    // Links
    t = t.replace(/\[(.+?)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    t = t.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    // Paragraphs
    t = t.split(/\n\n+/).map(para => {
      para = para.trim();
      if (!para) return '';
      if (/^<(h[1-6]|ul|ol|pre|blockquote|table|hr)/.test(para)) return para;
      return `<p>${para.replace(/\n/g, '<br>')}</p>`;
    }).join('');

    return t;
  }
};

/* ================================================================
   STATE
   ================================================================ */
const State = {
  username: '',
  bot: null,
  bots: [],
  history: {},   // botId -> [{role, content}]
  pendingAtts: [],
  sending: false,
};

/* ================================================================
   SUPABASE HELPER (anon fetch)
   ================================================================ */
async function sbFetch(path, opts = {}) {
  const r = await fetch(`${SUPA_URL}${path}`, {
    ...opts,
    headers: {
      'apikey': SUPA_ANON,
      'Authorization': `Bearer ${SUPA_ANON}`,
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    }
  });
  return r;
}

/* ================================================================
   BOOT
   ================================================================ */
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('qtt-name');
  if (saved) { State.username = saved; bootApp(); }
});

function enterChat() {
  const name = document.getElementById('name-inp').value.trim();
  if (!name) { document.getElementById('name-err').textContent = 'Nhập tên đi nào~'; return; }
  State.username = name;
  localStorage.setItem('qtt-name', name);
  bootApp();
}

async function bootApp() {
  document.getElementById('gate').classList.add('hide');
  document.getElementById('app').classList.add('show');
  document.getElementById('sb-user').textContent = `Xin chào, ${State.username}`;
  await loadBots();
}

/* ================================================================
   BOTS
   ================================================================ */
async function loadBots() {
  State.bots = [...BUILTIN_BOTS];
  try {
    const r = await sbFetch('/rest/v1/bot_requests?select=*&status=eq.approved&order=created_at.asc');
    if (r.ok) {
      const data = await r.json();
      State.bots.push(...data.map(b => ({
        id: b.id,
        name: b.name,
        avatar: b.avatar_url || '',
        desc: b.description || '',
        tag: '',
        prompt: b.prompt,
        custom: true
      })));
    }
  } catch {}
  renderBotList();
}

function renderBotList() {
  const list = document.getElementById('bot-list');
  const builtin = State.bots.filter(b => !b.custom);
  const custom  = State.bots.filter(b => b.custom);

  let h = `<div class="bot-section">Nhân vật chính</div>`;
  h += builtin.map(b => botItemHtml(b)).join('');
  if (custom.length) {
    h += `<div class="bot-section">Cộng đồng</div>`;
    h += custom.map(b => botItemHtml(b)).join('');
  }
  list.innerHTML = h;
}

function botItemHtml(b) {
  const avHtml = b.avatar
    ? `<img src="${b.avatar}" alt="" onerror="this.style.display='none'">`
    : b.name[0];
  return `<div class="bot-item" id="bitem-${b.id}" onclick="selectBot('${b.id}')">
    <div class="bot-av">${avHtml}</div>
    <div class="bot-info">
      <div class="bot-name">${b.name}</div>
      <div class="bot-desc">${b.desc}</div>
    </div>
    ${b.tag ? `<span class="badge-16">${b.tag}</span>` : ''}
  </div>`;
}

function selectBot(id) {
  const bot = State.bots.find(b => b.id === id);
  if (!bot) return;
  State.bot = bot;
  document.querySelectorAll('.bot-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`bitem-${id}`)?.classList.add('active');

  // Update header
  const avHtml = bot.avatar
    ? `<img src="${bot.avatar}" alt="" onerror="this.parentElement.innerHTML='${bot.name[0]}'">` 
    : bot.name[0];
  document.getElementById('hdr-av').innerHTML = avHtml;
  document.getElementById('hdr-name').textContent = bot.name;
  document.getElementById('hdr-desc').textContent = bot.desc;

  // Show history or welcome
  renderMessages();
  document.getElementById('msg-inp').focus();
  closeSidebar();
}

/* ================================================================
   MESSAGES
   ================================================================ */
function getHistory() {
  return State.history[State.bot?.id] || [];
}

function pushHistory(role, content) {
  if (!State.bot) return;
  if (!State.history[State.bot.id]) State.history[State.bot.id] = [];
  State.history[State.bot.id].push({ role, content });
}

function renderMessages() {
  const inner = document.getElementById('msgs-inner');
  const hist = getHistory();
  if (!hist.length) {
    inner.innerHTML = `<div class="welcome">
      <div class="welcome-av">${State.bot?.avatar ? `<img src="${State.bot.avatar}" alt="">` : State.bot?.name[0] || '✦'}</div>
      <h2>${State.bot?.name}</h2>
      <p>${State.bot?.desc}</p>
    </div>`;
    return;
  }
  inner.innerHTML = hist.map(m => buildMsgHtml(m)).join('');
  scrollBot();
}

function buildMsgHtml(m) {
  const isUser = m.role === 'user';
  const bot = State.bot;
  const avHtml = isUser
    ? `<div class="msg-av" style="background:var(--bg4)">${State.username[0]?.toUpperCase() || '?'}</div>`
    : `<div class="msg-av">${bot?.avatar ? `<img src="${bot.avatar}" alt="">` : bot?.name[0] || '?'}</div>`;

  // Parse content — may have text + attachments
  let textContent = typeof m.content === 'string' ? m.content : (m.content?.text || '');
  const atts = m.attachments || [];

  const attHtml = atts.map(a => {
    if (a.type === 'image') return `<img class="msg-att-img" src="${a.url}" onclick="openLbox('${a.url}')" alt="${a.name}">`;
    return `<div class="msg-att-file">📄 ${a.name}</div>`;
  }).join('');

  const nameHtml = !isUser ? `<div class="msg-name">${bot?.name}</div>` : '';
  const timeStr = m.time ? `<div class="msg-time">${m.time}</div>` : '';

  return `<div class="msg ${isUser ? 'user' : 'bot'}">
    ${!isUser ? avHtml : ''}
    <div>
      ${nameHtml}
      <div class="msg-bubble">${MD.render(textContent)}${attHtml}</div>
      ${timeStr}
    </div>
    ${isUser ? avHtml : ''}
  </div>`;
}

function appendMsg(m) {
  const inner = document.getElementById('msgs-inner');
  const welcome = inner.querySelector('.welcome');
  if (welcome) welcome.remove();
  const el = document.createElement('div');
  el.innerHTML = buildMsgHtml(m);
  inner.appendChild(el.firstElementChild);
  scrollBot();
}

function scrollBot() {
  const w = document.getElementById('msgs-wrap');
  w.scrollTop = w.scrollHeight;
}

function clearChat() {
  if (!State.bot) return;
  State.history[State.bot.id] = [];
  renderMessages();
  Toast.info('Đã xóa lịch sử chat');
}

/* ================================================================
   SEND
   ================================================================ */
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}
function grow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

async function sendMsg() {
  if (!State.bot) { Toast.warn('Chọn bot trước!'); return; }
  if (State.sending) return;
  const inp = document.getElementById('msg-inp');
  const text = inp.value.trim();
  const atts = [...State.pendingAtts];
  if (!text && !atts.length) return;

  inp.value = ''; inp.style.height = 'auto';
  clearAtts();
  State.sending = true;
  document.getElementById('send-btn').disabled = true;

  const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  const userMsg = { role: 'user', content: text, attachments: atts, time };
  appendMsg(userMsg);
  pushHistory('user', text);

  // Thinking indicator
  const thinkId = `think-${Date.now()}`;
  const thinkEl = document.createElement('div');
  thinkEl.id = thinkId;
  thinkEl.className = 'msg bot';
  thinkEl.innerHTML = `
    <div class="msg-av">${State.bot.avatar ? `<img src="${State.bot.avatar}" alt="">` : State.bot.name[0]}</div>
    <div>
      <div class="msg-name">${State.bot.name}</div>
      <div class="think-bubble"><div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div></div>
    </div>`;
  document.getElementById('msgs-inner').appendChild(thinkEl);
  scrollBot();

  try {
    // Build message content — include file descriptions
    let userContent = text;
    if (atts.length) {
      const attDesc = atts.map(a =>
        a.type === 'image' ? `[Ảnh đính kèm: ${a.name}]` : a.type === 'pdf' ? `[PDF đính kèm: ${a.name}]` : `[File văn bản: ${a.name}]\nNội dung: ${a.textContent || '(không đọc được)'}`
      ).join('\n');
      userContent = [text, attDesc].filter(Boolean).join('\n');
    }

    const messages = [
      ...getHistory().slice(0, -1).slice(-10).map(m => ({ role: m.role, content: m.content || '' })),
      { role: 'user', content: userContent }
    ];

    const r = await fetch(API.chat, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: State.bot.prompt, messages })
    });

    document.getElementById(thinkId)?.remove();

    if (!r.ok) { const e = await r.json(); throw new Error(e.error || 'Lỗi server'); }
    const data = await r.json();
    const reply = data.reply;

    const botMsg = { role: 'assistant', content: reply, time };
    appendMsg(botMsg);
    pushHistory('assistant', reply);

  } catch (e) {
    document.getElementById(thinkId)?.remove();
    const errMsg = { role: 'assistant', content: `⚠ Lỗi: ${e.message}`, time };
    appendMsg(errMsg);
  } finally {
    State.sending = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-inp').focus();
  }
}

/* ================================================================
   FILE UPLOAD
   ================================================================ */
async function onFile(e) {
  const allowed = ['image/png','image/jpeg','text/plain','application/pdf'];
  for (const file of Array.from(e.target.files)) {
    if (file.size > 8 * 1024 * 1024) { Toast.error(`${file.name}: quá lớn (max 8MB)`); continue; }
    if (!allowed.includes(file.type)) { Toast.error(`${file.name}: không hỗ trợ`); continue; }
    const att = { name: file.name, type: file.type.startsWith('image/') ? 'image' : file.type === 'application/pdf' ? 'pdf' : 'text', url: '', textContent: '' };
    
    if (att.type === 'image') {
      const reader = new FileReader();
      reader.onload = ev => {
        att.preview = ev.target.result;
        att.url = ev.target.result;
        addThumb(att);
      };
      reader.readAsDataURL(file);
    } else if (att.type === 'text') {
      const reader = new FileReader();
      reader.onload = ev => { att.textContent = ev.target.result.slice(0, 3000); addThumb(att); };
      reader.readAsText(file);
    } else {
      att.url = URL.createObjectURL(file);
      addThumb(att);
    }
    State.pendingAtts.push(att);
  }
  e.target.value = '';
}

function addThumb(att) {
  const bar = document.getElementById('att-preview');
  bar.classList.add('show');
  const idx = State.pendingAtts.indexOf(att);
  const d = document.createElement('div');
  d.className = 'att-thumb'; d.id = `at-${idx}`;
  d.innerHTML = att.type === 'image'
    ? `<img src="${att.preview}" alt=""><span>${att.name.slice(0,16)}</span><button class="att-rm" onclick="removeAtt(${idx})">✕</button>`
    : `<span>📄</span><span>${att.name.slice(0,16)}</span><button class="att-rm" onclick="removeAtt(${idx})">✕</button>`;
  bar.appendChild(d);
}

function removeAtt(idx) {
  State.pendingAtts.splice(idx, 1);
  document.getElementById(`at-${idx}`)?.remove();
  if (!State.pendingAtts.length) document.getElementById('att-preview').classList.remove('show');
}
function clearAtts() {
  State.pendingAtts = [];
  const b = document.getElementById('att-preview');
  b.innerHTML = ''; b.classList.remove('show');
}

/* ================================================================
   SUGGEST BOT MODAL
   ================================================================ */
function showSuggest() {
  showModal(`
    <div class="modal-hdr">
      <span class="modal-title">✦ Đề xuất bot mới</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="sug-ok" class="alert alert-ok"></div>
    <div id="sug-err" class="alert alert-err"></div>
    <div class="field"><label class="label">Tên bot</label><input class="inp" id="s-name" placeholder="Tên nhân vật..."></div>
    <div class="field"><label class="label">Avatar URL</label><input class="inp" id="s-av" placeholder="https://...jpg hoặc để trống"></div>
    <div class="field"><label class="label">Mô tả ngắn</label><input class="inp" id="s-desc" placeholder="Tính cách, phong cách..."></div>
    <div class="field"><label class="label">System Prompt</label><textarea class="inp" id="s-prompt" placeholder="Mô tả chi tiết nhân vật, cách nói chuyện, tính cách..." style="min-height:120px"></textarea></div>
    <div class="field"><label class="label">Người đề xuất</label><input class="inp" id="s-by" value="${State.username}" placeholder="Tên bạn"></div>
    <button class="btn btn-primary w-full mt8" onclick="submitSuggest()">GỬI ĐỀ XUẤT</button>`);
}

async function submitSuggest() {
  const name   = document.getElementById('s-name').value.trim();
  const av     = document.getElementById('s-av').value.trim();
  const desc   = document.getElementById('s-desc').value.trim();
  const prompt = document.getElementById('s-prompt').value.trim();
  const by     = document.getElementById('s-by').value.trim() || State.username;

  if (!name || !prompt) { showModalAlert('sug-err', 'Cần có tên và prompt!'); return; }

  try {
    const r = await sbFetch('/rest/v1/bot_requests', {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ name, avatar_url: av || null, description: desc, prompt, submitted_by: by, status: 'pending' })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
    showModalAlert('sug-ok', '✓ Đã gửi! Admin sẽ xét duyệt sớm.', true);
    setTimeout(closeModal, 2000);
  } catch (e) {
    showModalAlert('sug-err', 'Lỗi: ' + e.message);
  }
}

/* ================================================================
   MODAL / UI HELPERS
   ================================================================ */
function showModal(html) {
  closeModal();
  const ov = document.createElement('div');
  ov.className = 'overlay'; ov.id = 'active-modal';
  ov.innerHTML = `<div class="modal">${html}</div>`;
  ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal() { document.getElementById('active-modal')?.remove(); }

function showModalAlert(id, msg, ok = false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = `alert ${ok ? 'alert-ok' : 'alert-err'} show`;
}

function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay-mob').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay-mob').classList.remove('show'); }
function openLbox(url)  { document.getElementById('lbox-img').src = url; document.getElementById('lbox').classList.add('show'); }
function closeLbox()    { document.getElementById('lbox').classList.remove('show'); }

const Toast = {
  show(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<div class="t-dot"></div><span>${msg}</span>`;
    document.getElementById('toast-root').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  },
  success: m => Toast.show(m, 'success'),
  error:   m => Toast.show(m, 'error'),
  info:    m => Toast.show(m, 'info'),
  warn:    m => Toast.show(m, 'info'),
};
