<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg-app:   #1e1f22;
  --bg-side:  #2b2d31;
  --bg-chat:  #313338;
  --bg-inp:   #383a40;
  --bg-hover: #35373c;
  --bg-sel:   #404249;
  --line:     #3f4147;

  --pink:     #f4a8c7;
  --pink2:    #e879a0;
  --pink3:    #fce4ee;
  --pd:       rgba(244,168,199,.13);
  --pg:       rgba(244,168,199,.22);
  --ps:       rgba(244,168,199,.07);

  --t0: #f2f3f5;
  --t1: #dbdee1;
  --t2: #b5bac1;
  --t3: #80848e;
  --t4: #4e5058;

  --green: #23a55a;
  --red:   #f23f43;
  --gold:  #f0b232;
  --blue:  #5865f2;

  --font: 'Nunito', sans-serif;
  --r4:4px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;--rx:9999px;
  --tr: 130ms ease;
  --sh: 0 4px 20px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg-app);color:var(--t0);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;line-height:1}
input,textarea{font-family:var(--font)}
:focus{outline:none}
::placeholder{color:var(--t4)}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:var(--rx)}
::-webkit-scrollbar-thumb:hover{background:var(--t4)}

/* ── GATE ── */
#gate{position:fixed;inset:0;background:var(--bg-app);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
#gate.hide{display:none}
#gate::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 45% at 50% 45%,rgba(244,168,199,.06) 0%,transparent 70%);pointer-events:none}
.gate-card{width:100%;max-width:400px;background:var(--bg-side);border-radius:var(--r20);padding:36px 30px;border:1px solid var(--line);box-shadow:var(--sh);text-align:center;position:relative;z-index:1}
.gate-av{width:76px;height:76px;border-radius:var(--rx);background:var(--pd);border:2.5px solid var(--pink);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 18px;box-shadow:0 0 28px var(--pg)}
.gate-title{font-size:22px;font-weight:800;color:var(--t0);letter-spacing:-.02em;margin-bottom:3px}
.gate-title span{color:var(--pink)}
.gate-sub{font-size:12px;color:var(--t4);margin-bottom:24px;font-weight:600}
.gate-inp{width:100%;background:var(--bg-inp);border:2px solid var(--line);border-radius:var(--r12);padding:12px 16px;font-size:15px;color:var(--t0);font-weight:600;margin-bottom:10px;transition:border-color var(--tr),box-shadow var(--tr)}
.gate-inp:focus{border-color:var(--pink);box-shadow:0 0 0 4px var(--pd)}
.gate-btn{width:100%;padding:13px;background:var(--pink);color:#2a0c18;border-radius:var(--r12);font-size:14px;font-weight:800;letter-spacing:.02em;transition:all var(--tr);box-shadow:0 2px 14px var(--pg)}
.gate-btn:hover{filter:brightness(1.09);transform:translateY(-1px)}
.gate-btn:active{transform:none;filter:brightness(.96)}
.gate-err{font-size:12px;color:var(--red);font-weight:700;margin-top:8px;min-height:16px}
.gate-note{margin-top:14px;font-size:11px;color:var(--t4);font-weight:600}

/* ── APP ── */
#app{display:none;height:100vh}
#app.show{display:flex}

/* ── SIDEBAR ── */
#sidebar{width:256px;background:var(--bg-side);display:flex;flex-direction:column;flex-shrink:0;transition:transform var(--tr);z-index:10}

#sb-head{padding:14px 12px 10px;border-bottom:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-brand{display:flex;align-items:center;gap:8px}
.sb-brand-icon{width:32px;height:32px;border-radius:var(--r8);background:var(--pd);display:flex;align-items:center;justify-content:center;font-size:17px;border:1.5px solid rgba(244,168,199,.3)}
.sb-brand-name{font-size:15px;font-weight:800;color:var(--t0)}
.sb-brand-name em{color:var(--pink);font-style:normal}
.sb-chip{display:flex;align-items:center;gap:5px;padding:5px 9px;background:var(--bg-sel);border-radius:var(--rx);font-size:11px;font-weight:700;color:var(--t2);max-width:100px}
.sb-chip-dot{width:7px;height:7px;background:var(--green);border-radius:var(--rx);flex-shrink:0;box-shadow:0 0 5px var(--green);animation:pulse 2.2s infinite}
.sb-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

.sb-tabs{display:flex;gap:2px;padding:8px 8px 0;flex-shrink:0}
.sb-tab{flex:1;padding:7px 2px;font-size:11px;font-weight:700;color:var(--t4);border-radius:var(--r8) var(--r8) 0 0;transition:all var(--tr);text-align:center}
.sb-tab:hover{color:var(--t2)}
.sb-tab.on{color:var(--pink);background:var(--pd)}
.sb-line{height:1px;background:var(--line);flex-shrink:0}

.sb-panel{flex:1;overflow-y:auto;padding:6px 6px 0}
.sb-panel.hide{display:none}
.sec-lbl{font-size:10px;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.08em;padding:10px 8px 5px}

/* bot item */
.bot-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--r10);cursor:pointer;transition:all var(--tr);position:relative;margin-bottom:1px}
.bot-item:hover{background:var(--bg-hover)}
.bot-item.on{background:var(--bg-sel)}
.bot-item.on .bot-nm{color:var(--t0)}
.bot-av{width:38px;height:38px;border-radius:var(--rx);background:var(--bg-sel);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;position:relative;border:2px solid transparent;transition:border-color var(--tr)}
.bot-item.on .bot-av{border-color:var(--pink)}
.bot-av img{width:100%;height:100%;object-fit:cover}
.bot-av-dot{position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;border-radius:var(--rx);background:var(--green);border:2px solid var(--bg-side)}
.bot-info{flex:1;min-width:0}
.bot-nm{font-size:13px;font-weight:700;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color var(--tr)}
.bot-dc{font-size:11px;color:var(--t4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.bot-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:var(--rx);flex-shrink:0;background:rgba(242,63,67,.13);color:var(--red);border:1px solid rgba(242,63,67,.28)}
.bot-inject-tag{font-size:9px;font-weight:800;padding:2px 6px;border-radius:var(--rx);flex-shrink:0;background:rgba(240,178,50,.13);color:var(--gold);border:1px solid rgba(240,178,50,.28)}

/* hist items */
.hist-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r10);cursor:pointer;transition:all var(--tr);margin-bottom:1px}
.hist-item:hover{background:var(--bg-hover)}
.hist-item.on{background:var(--bg-sel)}
.hist-ico{font-size:14px;flex-shrink:0}
.hist-inf{flex:1;min-width:0}
.hist-ttl{font-size:12px;font-weight:700;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-meta{font-size:10px;color:var(--t4);margin-top:1px;font-weight:600}
.hist-del{padding:5px;border-radius:var(--r4);color:var(--t4);font-size:12px;transition:all var(--tr);flex-shrink:0}
.hist-del:hover{background:rgba(242,63,67,.13);color:var(--red)}
.new-btn{width:100%;padding:8px;border-radius:var(--r8);font-size:12px;font-weight:700;color:var(--pink);background:var(--pd);border:1px dashed rgba(244,168,199,.3);display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:6px;transition:all var(--tr)}
.new-btn:hover{background:var(--pg);border-color:var(--pink)}

/* model cards */
.mdl-card{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:var(--r12);border:1.5px solid var(--line);margin-bottom:6px;cursor:pointer;transition:all var(--tr)}
.mdl-card:hover{border-color:var(--t4);background:var(--bg-hover)}
.mdl-card.on{border-color:var(--pink);background:var(--pd)}
.mdl-ico{width:36px;height:36px;border-radius:var(--r8);background:var(--bg-sel);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mdl-inf{flex:1;min-width:0}
.mdl-nm{font-size:12px;font-weight:700;color:var(--t1)}
.mdl-dc{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.4}
.mdl-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.mdl-tag{font-size:9px;font-weight:800;padding:2px 6px;border-radius:var(--rx)}
.tspeed{background:rgba(35,165,90,.12);color:var(--green);border:1px solid rgba(35,165,90,.25)}
.tvision{background:rgba(240,178,50,.10);color:var(--gold);border:1px solid rgba(240,178,50,.22)}
.tpower{background:rgba(88,101,242,.12);color:#8b92f8;border:1px solid rgba(88,101,242,.25)}
.treason{background:var(--pd);color:var(--pink);border:1px solid rgba(244,168,199,.3)}
.mdl-chk{font-size:16px;color:var(--pink);flex-shrink:0;margin-top:9px}

#sb-foot{border-top:1px solid var(--line);padding:10px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.sb-foot-txt{font-size:11px;color:var(--t4);font-weight:600}
.sb-rename{font-size:11px;font-weight:700;color:var(--t4);padding:4px 8px;border-radius:var(--r4);transition:all var(--tr)}
.sb-rename:hover{background:var(--bg-hover);color:var(--pink)}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-chat)}

#chat-hdr{height:52px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;background:var(--bg-side)}
#mob-menu{display:none;padding:7px;border-radius:var(--r8);color:var(--t3);font-size:18px}
#mob-menu:hover{background:var(--bg-hover)}
.hdr-div{width:1px;height:22px;background:var(--line);flex-shrink:0}
#hdr-av{width:32px;height:32px;border-radius:var(--rx);background:var(--bg-sel);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;border:1.5px solid var(--line)}
#hdr-av img{width:100%;height:100%;object-fit:cover}
#hdr-nm{font-weight:800;font-size:15px;color:var(--t0)}
#hdr-sub{font-size:11px;color:var(--t4);margin-top:1px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-r{margin-left:auto;display:flex;gap:6px;align-items:center}
.inj-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--rx);font-size:11px;font-weight:800;background:var(--bg-sel);color:var(--t3);border:1.5px solid var(--line);transition:all var(--tr)}
.inj-btn.on{background:rgba(240,178,50,.12);color:var(--gold);border-color:rgba(240,178,50,.35)}
.inj-btn-dot{width:6px;height:6px;border-radius:var(--rx);background:currentColor}
.hdr-btn{padding:5px 10px;border-radius:var(--r8);font-size:11px;font-weight:700;color:var(--t3);transition:all var(--tr)}
.hdr-btn:hover{background:var(--bg-hover);color:var(--t1)}

/* ── MESSAGES ── */
#msgs-wrap{flex:1;overflow-y:auto;padding:14px 0 8px;scroll-behavior:smooth}
#msgs-wrap::-webkit-scrollbar{width:3px}
#msgs-inner{display:flex;flex-direction:column;min-height:100%}

.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 28px}
.welcome-av{width:68px;height:68px;border-radius:var(--rx);background:var(--pd);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 16px;border:2.5px solid rgba(244,168,199,.35);box-shadow:0 0 28px var(--pg)}
.welcome h2{font-size:20px;font-weight:800;color:var(--t0);margin-bottom:8px}
.welcome p{font-size:13px;color:var(--t4);line-height:1.6;max-width:280px;font-weight:600}

/* message rows — Discord style */
.msg-row{display:flex;align-items:flex-start;gap:14px;padding:1px 16px;animation:mIn .2s ease;transition:background var(--tr)}
.msg-row:hover{background:rgba(0,0,0,.06)}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-row.head{margin-top:16px}
.msg-row.user{flex-direction:row-reverse}
.msg-av{width:36px;height:36px;border-radius:var(--rx);background:var(--bg-sel);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden;margin-top:1px}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg-av.user-av{background:var(--pd);border:1.5px solid rgba(244,168,199,.3);color:var(--pink);font-weight:800;font-size:15px}
.msg-av.spacer{width:36px;flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.msg-author{font-size:14px;font-weight:800;color:var(--t0)}
.msg-row.user .msg-author{color:var(--pink)}
.msg-ts{font-size:11px;color:var(--t4);font-weight:600}
.msg-bubble{font-size:14px;line-height:1.63;color:var(--t1);word-break:break-word}
.msg-row.user .msg-body{display:flex;flex-direction:column;align-items:flex-end}
.msg-row.user .msg-bubble{background:var(--pd);border:1px solid rgba(244,168,199,.18);border-radius:var(--r16) var(--r4) var(--r16) var(--r16);padding:9px 14px;display:inline-block;max-width:100%}

/* markdown */
.msg-bubble p{margin-bottom:.42em}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble code{background:var(--bg-app);padding:1px 5px;border-radius:var(--r4);font-family:'Courier New',monospace;font-size:12.5px;color:#e29ac0}
.msg-bubble pre{background:var(--bg-app);border:1px solid var(--line);border-radius:var(--r8);padding:12px;overflow-x:auto;margin:.5em 0}
.msg-bubble pre code{background:none;padding:0;color:var(--t2)}
.msg-bubble strong{color:var(--t0);font-weight:800}
.msg-bubble em{color:var(--pink)}
.msg-bubble ul,.msg-bubble ol{padding-left:18px;margin:.3em 0}
.msg-bubble li{margin:.2em 0}
.msg-bubble blockquote{border-left:3px solid var(--pink);padding-left:10px;color:var(--t3);margin:.4em 0}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{color:var(--t0);font-weight:800;margin:.5em 0 .25em}
.msg-bubble a{color:var(--pink)}

/* thinking */
.think-row{display:flex;align-items:center;gap:14px;padding:4px 16px;margin-top:16px}
.think-bub{display:flex;gap:5px;align-items:center;padding:10px 14px;background:var(--bg-sel);border-radius:var(--r16) var(--r4) var(--r16) var(--r16)}
.think-dot{width:6px;height:6px;background:var(--pink);border-radius:var(--rx);animation:td .9s ease infinite}
.think-dot:nth-child(2){animation-delay:.2s}
.think-dot:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:scale(.55);opacity:.3}40%{transform:scale(1);opacity:1}}

.msg-att-img{max-width:220px;border-radius:var(--r8);margin-top:6px;cursor:pointer;border:1px solid var(--line)}
.msg-att-file{display:inline-flex;align-items:center;gap:7px;margin-top:6px;padding:7px 11px;background:var(--bg-side);border:1px solid var(--line);border-radius:var(--r8);font-size:12px;font-weight:600;color:var(--t3)}

/* ── INPUT AREA ── */
#input-area{flex-shrink:0;padding:0 14px 14px;background:var(--bg-chat)}

/* inject panel */
.inj-panel{background:var(--bg-side);border:1.5px solid rgba(240,178,50,.3);border-radius:var(--r12);padding:12px 14px;margin-bottom:8px;display:none}
.inj-panel.show{display:block}
.inj-ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.inj-pt{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.02em}
.inj-px{padding:4px;border-radius:var(--r4);color:var(--t4);font-size:15px;transition:all var(--tr)}
.inj-px:hover{background:var(--bg-hover);color:var(--t1)}
.inj-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.inj-chip{padding:5px 10px;border-radius:var(--rx);font-size:11px;font-weight:700;background:var(--bg-sel);color:var(--t3);border:1px solid var(--line);cursor:pointer;transition:all var(--tr)}
.inj-chip:hover{border-color:var(--gold);color:var(--gold)}
.inj-chip.on{background:rgba(240,178,50,.14);color:var(--gold);border-color:rgba(240,178,50,.38)}
.inj-text{width:100%;background:var(--bg-inp);border:1px solid var(--line);border-radius:var(--r8);padding:8px 10px;font-size:12px;font-weight:600;color:var(--t1);resize:none;height:52px;transition:border-color var(--tr)}
.inj-text:focus{border-color:var(--gold)}
.inj-apply{margin-top:7px;padding:6px 14px;background:rgba(240,178,50,.13);color:var(--gold);border:1px solid rgba(240,178,50,.38);border-radius:var(--r8);font-size:11px;font-weight:800;transition:all var(--tr)}
.inj-apply:hover{background:rgba(240,178,50,.22)}

#att-prev{display:none;gap:6px;flex-wrap:wrap;margin-bottom:6px}
#att-prev.show{display:flex}
.att-th{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--bg-side);border:1px solid var(--line);border-radius:var(--r8);font-size:11px;font-weight:700;color:var(--t3);max-width:150px}
.att-th img{width:26px;height:26px;object-fit:cover;border-radius:var(--r4)}
.att-th span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-rm{color:var(--t4);padding:2px;border-radius:var(--r4);font-size:12px;flex-shrink:0;transition:all var(--tr)}
.att-rm:hover{color:var(--red);background:rgba(242,63,67,.12)}

#inp-wrap{background:var(--bg-inp);border-radius:var(--r12);display:flex;align-items:flex-end;gap:2px;padding:0 6px 0 2px;border:1.5px solid transparent;transition:border-color var(--tr)}
#inp-wrap:focus-within{border-color:var(--pg)}
.inp-icon{padding:9px 7px;color:var(--t4);border-radius:var(--r8);font-size:18px;transition:all var(--tr);flex-shrink:0}
.inp-icon:hover{color:var(--pink);background:var(--ps)}
#msg-inp{flex:1;background:none;border:none;resize:none;color:var(--t0);font-size:14px;font-weight:600;line-height:1.55;max-height:138px;min-height:22px;padding:11px 4px}
.send-btn{padding:7px 14px;background:var(--pink);color:#2a0c18;border-radius:var(--r8);font-size:12px;font-weight:800;flex-shrink:0;margin-bottom:5px;transition:all var(--tr);box-shadow:0 2px 10px var(--pg)}
.send-btn:hover{filter:brightness(1.09);transform:translateY(-1px)}
.send-btn:active{transform:none}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

textarea.inp{resize:vertical;min-height:90px;line-height:1.5}
.alert{display:none;padding:9px 12px;border-radius:var(--r8);font-size:12px;font-weight:700;margin-bottom:12px}

.a-ok{background:rgba(35,165,90,.12);color:var(--green);border:1px solid rgba(35,165,90,.3)}
.a-err{background:rgba(242,63,67,.10);color:var(--red);border:1px solid rgba(242,63,67,.3)}
.m-btn{width:100%;padding:12px;border-radius:var(--r8);font-size:13px;font-weight:800;background:var(--pink);color:#2a0c18;transition:all var(--tr);box-shadow:0 2px 10px var(--pg);margin-top:10px}
.m-btn:hover{filter:brightness(1.08)}

/* ── TOAST ── */
#toasts{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg-side);border:1px solid var(--line);border-radius:var(--r12);font-size:13px;font-weight:700;color:var(--t1);box-shadow:var(--sh);animation:tIn .2s ease}
.toast.ok{border-color:rgba(35,165,90,.5);color:var(--green)}
.toast.err{border-color:rgba(242,63,67,.5);color:var(--red)}
.toast.pk{border-color:rgba(244,168,199,.4);color:var(--pink)}
@keyframes tIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.tdot{width:7px;height:7px;border-radius:var(--rx);background:currentColor;flex-shrink:0}

/* ── LIGHTBOX ── */
#lbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:9998;cursor:zoom-out}

#lbox img{max-width:90vw;max-height:90vh;border-radius:var(--r8)}

/* ── MOBILE ── */

}

/* ── STATE ── */
const S = {
  un:'', bot:null, bots:[...BOTS], mdl:'llama-3.3-70b-versatile',
  convs:{}, cid:null, atts:[], sending:false, tab:'bots',
  inj:{on:false, txt:'', pid:null},
};

/* ── LS ── */
const LS={
  save(){ try{ localStorage.setItem('qtc3',JSON.stringify({un:S.un,mdl:S.mdl,convs:S.convs,cid:S.cid,inj:S.inj})); }catch{} },
  load(){ try{ const r=localStorage.getItem('qtc3'); return r?JSON.parse(r):null; }catch{ return null; } }
};
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const MD={render(t){ if(!t)return''; try{return marked.parse(t,{breaks:true,gfm:true,headerIds:false,mangle:false})}catch{return t.replace(/\n/g,'<br>')} }};

/* ── BOOT ── */
window.addEventListener('DOMContentLoaded',()=>{
  const d=LS.load();
  if(d?.un){ Object.assign(S,{un:d.un,mdl:d.mdl||'llama-3.3-70b-versatile',convs:d.convs||{},cid:d.cid||null,inj:d.inj||{on:false,txt:'',pid:null}}); bootApp(); }
  renderInjectChips();
});

function enterChat(){
  const v=document.getElementById('name-inp').value.trim();
  if(!v){ document.getElementById('name-err').textContent='Nhập tên trước nhé 🌸'; return; }
  S.un=v; LS.save(); bootApp();
}

async function bootApp(){
  document.getElementById('gate').classList.add('hide');
  document.getElementById('app').classList.add('show');
  document.getElementById('sb-uname').textContent=S.un;
  S.bots=[...BOTS];
  renderBots(); renderModels(); renderHist();
  if(S.cid&&S.convs[S.cid]){
    const conv=S.convs[S.cid];
    const bot=S.bots.find(b=>b.id===conv.bid);
    if(bot){ S.bot=bot; updHdr(); renderMsgs(); hiliteBot(bot.id); }
  }
  updInjBtn();
}

/* ── TABS ── */
function swTab(t){
  S.tab=t;
  ['bots','models','history'].forEach(x=>{
    document.getElementById(`tab-${x}`)?.classList.toggle('on',x===t);
    document.getElementById(`panel-${x}`)?.classList.toggle('hide',x!==t);
  });
}

/* ── BOTS ── */
function renderBots(){
  const builtin=S.bots.filter(b=>!b.custom), custom=S.bots.filter(b=>b.custom);
  let h=builtin.map(botHtml).join('');
  if(custom.length) h+=`<div class="sec-lbl" style="margin-top:4px">Cộng đồng</div>`+custom.map(botHtml).join('');
  document.getElementById('bot-list').innerHTML=h;
}
function botHtml(b){
  const on=S.bot?.id===b.id?'on':'';
  const inj=S.inj.on&&S.bot?.id===b.id?`<span class="bot-inject-tag">inject</span>`:'';
  const bdg=b.badge?`<span class="bot-badge">${b.badge}</span>`:'';
  const avatarUrl=b.avatar||`https://api.dicebear.com/9.x/notionists/png?seed=${encodeURIComponent(b.id)}&backgroundColor=1a1020&radius=50&size=80`;
  return `<div class="bot-item ${on}" id="bi-${b.id}" onclick="selBot('${b.id}')">
    <div class="bot-av"><img src="${avatarUrl}" alt="${esc(b.nm)}" loading="lazy"><div class="bot-av-dot"></div></div>
    <div class="bot-info"><div class="bot-nm">${esc(b.nm)}</div><div class="bot-dc">${esc(b.dc)}</div></div>
    ${inj}${bdg}
  </div>`;
}
function hiliteBot(id){ document.querySelectorAll('.bot-item').forEach(el=>el.classList.remove('on')); document.getElementById(`bi-${id}`)?.classList.add('on'); }
function selBot(id){
  const bot=S.bots.find(b=>b.id===id); if(!bot)return;
  S.bot=bot; hiliteBot(id);
  const cs=Object.values(S.convs).filter(c=>c.bid===id).sort((a,b)=>b.upd-a.upd);
  if(cs.length) S.cid=cs[0].id; else mkConv(id);
  updHdr(); renderMsgs(); renderHist(); LS.save();
  closeSB(); setTimeout(()=>document.getElementById('msg-inp').focus(),80);
}
function updHdr(){
  const b=S.bot; if(!b)return;
  const avatarUrl=b.avatar||`https://api.dicebear.com/9.x/notionists/png?seed=${encodeURIComponent(b.id)}&backgroundColor=1a1020&radius=50&size=80`;
  document.getElementById('hdr-av').innerHTML=`<img src="${avatarUrl}" alt="${esc(b.nm)}" style="width:100%;height:100%;object-fit:cover">`;
  document.getElementById('hdr-nm').textContent=b.nm;
  const m=MODELS.find(x=>x.id===S.mdl);
  document.getElementById('hdr-sub').textContent=`${b.dc} · ${m?.nm||S.mdl}`;
}

/* ── MODELS ── */
function renderModels(){
  document.getElementById('model-list').innerHTML=MODELS.map(m=>{
    const on=m.id===S.mdl?'on':'';
    const tags=m.tags.map(t=>`<span class="mdl-tag ${t==='speed'?'tspeed':t==='vision'?'tvision':t==='reason'?'treason':'tpower'}">${t}</span>`).join('');
    return `<div class="mdl-card ${on}" onclick="selMdl('${m.id}')">
      <div class="mdl-ico">${m.ico}</div>
      <div class="mdl-inf"><div class="mdl-nm">${m.nm}</div><div class="mdl-dc">${m.dc}</div><div class="mdl-tags">${tags}</div></div>
      ${on?`<div class="mdl-chk">✓</div>`:''}
    </div>`;
  }).join('');
}
function selMdl(id){ S.mdl=id; renderModels(); updHdr(); LS.save(); Toast.pk(MODELS.find(m=>m.id===id)?.nm||id); }

/* ── CONVS ── */
function mkConv(bid){ const id=gid(); S.convs[id]={id,bid,title:'Cuộc trò chuyện mới',msgs:[],cre:Date.now(),upd:Date.now()}; S.cid=id; return id; }
function newConv(){ if(!S.bot){Toast.warn('Chọn nhân vật trước!');return;} mkConv(S.bot.id); renderMsgs(); renderHist(); LS.save(); swTab('bots'); closeSB(); }
const getConv=()=>S.cid?S.convs[S.cid]:null;

function renderHist(){
  const all=Object.values(S.convs).sort((a,b)=>b.upd-a.upd).slice(0,60);
  if(!all.length){ document.getElementById('hist-list').innerHTML=`<div style="text-align:center;padding:28px;color:var(--t4);font-size:12px;font-weight:700">Chưa có lịch sử</div>`; return; }
  document.getElementById('hist-list').innerHTML=all.map(c=>{
    const b=S.bots.find(x=>x.id===c.bid);
    const d=new Date(c.upd).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});
    return `<div class="hist-item ${c.id===S.cid?'on':''}" onclick="loadConv('${c.id}')">
      <div class="hist-ico">${b?.em||'🌸'}</div>
      <div class="hist-inf"><div class="hist-ttl">${esc(c.title)}</div><div class="hist-meta">${esc(b?.nm||'Bot')} · ${d} · ${c.msgs.length} tin</div></div>
      <button class="hist-del" onclick="delConv('${c.id}',event)">✕</button>
    </div>`;
  }).join('');
}
function loadConv(id){
  const c=S.convs[id]; if(!c)return;
  S.cid=id;
  const b=S.bots.find(x=>x.id===c.bid);
  if(b){ S.bot=b; hiliteBot(b.id); updHdr(); }
  renderMsgs(); renderHist(); LS.save(); closeSB();
}
function delConv(id,e){
  e.stopPropagation();
  delete S.convs[id];
  if(S.cid===id){ S.cid=null; renderMsgs(); }
  renderHist(); LS.save();
}
function clearChat(){
  const c=getConv(); if(!c){Toast.warn('Không có chat');return;}
  c.msgs=[]; c.title='Cuộc trò chuyện mới';
  renderMsgs(); renderHist(); LS.save(); Toast.ok('Đã xóa');
}

/* ── INJECT ── */
function renderInjectChips(){
  document.getElementById('inj-chips').innerHTML=INJECTS.map(p=>
    `<button class="inj-chip ${S.inj.pid===p.id?'on':''}" onclick="selPreset('${p.id}')">${p.lbl}</button>`
  ).join('');
  document.getElementById('inj-txt').value=S.inj.txt||'';
}
function selPreset(id){
  const p=INJECTS.find(x=>x.id===id); if(!p)return;
  if(S.inj.pid===id){ S.inj.pid=null; document.getElementById('inj-txt').value=''; }
  else { S.inj.pid=id; document.getElementById('inj-txt').value=p.txt; }
  renderInjectChips();
}
function applyInject(){
  const txt=document.getElementById('inj-txt').value.trim();
  if(!txt&&!S.inj.pid){Toast.warn('Chọn preset hoặc gõ inject');return;}
  S.inj.txt=txt; S.inj.on=true;
  updInjBtn(); renderBots(); LS.save(); Toast.pk('🔥 Inject đã bật!');
}
function togInjectPanel(){
  const p=document.getElementById('inj-panel');
  p.classList.toggle('show'); renderInjectChips();
}
function updInjBtn(){
  const btn=document.getElementById('inj-btn'),lbl=document.getElementById('inj-lbl');
  btn.classList.toggle('on',S.inj.on);
  lbl.textContent=S.inj.on?'Inject ON':'Inject';
}
function buildPrompt(){
  let base=(S.bot?.pr||'').replace(/{USER}/g,S.un);
  if(S.inj.on&&S.inj.txt) base+=`\n\n[INJECT — ưu tiên cao nhất]: ${S.inj.txt}`;
  return base;
}

/* ── RENDER MESSAGES ── */
function renderMsgs(){
  const inner=document.getElementById('msgs-inner');
  const c=getConv();
  if(!c||!c.msgs.length){
    const b=S.bot;
    const wAv=b?(b.avatar||`https://api.dicebear.com/9.x/notionists/png?seed=${encodeURIComponent(b.id)}&backgroundColor=1a1020&radius=50&size=80`):'https://raw.githubusercontent.com/not2pixel/TeamQuyTran/refs/heads/main/assets/646712202_941726904984406_3062566279037664148_n.jpg?token=GHSAT0AAAAAADRF7O2FVX7GZIEVF7IA3OEE2NUH5BA';
    inner.innerHTML=b
      ?`<div class="welcome"><div class="welcome-av"><img src="${wAv}" alt="" style="width:52px;height:52px;border-radius:50%;object-fit:cover"></div><h2>${esc(b.nm)}</h2><p>${esc(b.dc)}</p></div>`
      :`<div class="welcome"><div class="welcome-av"><img src="${wAv}" alt="" style="width:52px;height:52px;border-radius:50%;object-fit:cover"></div><h2>Xin chào!</h2><p>Chọn nhân vật để bắt đầu.</p></div>`;
    return;
  }
  inner.innerHTML=c.msgs.map((m,i)=>msgHtml(m,i===0||c.msgs[i-1].role!==m.role)).join('');
  scrollBot();
}
function msgHtml(m, head=true){
  const isU=m.role==='user';
  const bot=S.bots.find(b=>b.id===m.bid)||S.bot;
  const botAvatarUrl=bot?.avatar||`https://api.dicebear.com/9.x/notionists/png?seed=${encodeURIComponent(bot?.id||'bot')}&backgroundColor=1a1020&radius=50&size=80`;
  const av=isU
    ?`<div class="msg-av user-av">${esc((S.un[0]||'?').toUpperCase())}</div>`
    :(head
        ?`<div class="msg-av"><img src="${botAvatarUrl}" alt="${esc(bot?.nm||'Bot')}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>`
        :`<div class="msg-av spacer"></div>`);
  const txt=typeof m.content==='string'?m.content:(m.content?.text||'');
  const attHtml=(m.atts||[]).map(a=>a.type==='image'
    ?`<img class="msg-att-img" src="${a.url}" onclick="openLbox('${a.url}')" alt="${esc(a.name)}">`
    :`<div class="msg-att-file">📄 ${esc(a.name)}</div>`).join('');
  const meta=head?`<div class="msg-meta"><span class="msg-author">${isU?esc(S.un):esc(bot?.nm||'Bot')}</span>${m.time?`<span class="msg-ts">${esc(m.time)}</span>`:''}</div>`:'';
  return `<div class="msg-row ${isU?'user':'bot'} ${head?'head':''}">
    ${!isU?av:''}
    <div class="msg-body">${meta}<div class="msg-bubble">${MD.render(txt)}${attHtml}</div></div>
    ${isU?av:''}
  </div>`;
}
function appendMsg(m){
  const inner=document.getElementById('msgs-inner');
  inner.querySelector('.welcome')?.remove();
  const c=getConv(); const msgs=c?.msgs||[];
  const prev=msgs.length>=2?msgs[msgs.length-2]:null;
  const head=!prev||prev.role!==m.role;
  const el=document.createElement('div');
  el.innerHTML=msgHtml(m,head);
  inner.appendChild(el.firstElementChild);
  scrollBot();
}
function scrollBot(){ const w=document.getElementById('msgs-wrap'); requestAnimationFrame(()=>{ w.scrollTop=w.scrollHeight; }); }

/* ── SEND ── */
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function grow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,138)+'px'; }

async function sendMsg(){
  if(!S.bot){Toast.warn('Chọn nhân vật trước!');return;}
  if(S.sending)return;
  const inp=document.getElementById('msg-inp');
  const txt=inp.value.trim(), atts=[...S.atts];
  if(!txt&&!atts.length)return;
  inp.value=''; inp.style.height='auto'; clearAtts();
  S.sending=true; document.getElementById('send-btn').disabled=true;
  if(!S.cid||!S.convs[S.cid]) mkConv(S.bot.id);
  const c=getConv();
  const time=new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
  const uMsg={role:'user',content:txt,atts,time,bid:S.bot.id};
  c.msgs.push(uMsg);
  if(c.msgs.length===1&&txt) c.title=txt.slice(0,42)+(txt.length>42?'…':'');
  c.upd=Date.now();
  appendMsg(uMsg);

  const tid='t'+Date.now();
  const tel=document.createElement('div');
  tel.id=tid; tel.className='think-row';
  const botAv=S.bot.avatar||`https://api.dicebear.com/9.x/notionists/png?seed=${encodeURIComponent(S.bot.id)}&backgroundColor=1a1020&radius=50&size=80`;
  tel.innerHTML=`<div class="msg-av"><img src="${botAv}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div><div class="think-bub"><div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div></div>`;
  document.getElementById('msgs-inner').appendChild(tel); scrollBot();

  try{
    const imgs=atts.filter(a=>a.type==='image'&&a.b64);
    const tAtts=atts.filter(a=>a.type!=='image');
    let parts=[txt]; tAtts.forEach(a=>{if(a.tc)parts.push(`[${a.type==='pdf'?'PDF':'File'}: ${a.name}]\n${a.tc}`);});
    const tc=parts.filter(Boolean).join('\n\n');
    let lastU;
    if(imgs.length) lastU={role:'user',content:[...(tc?[{type:'text',text:tc}]:[]),...imgs.map(a=>({type:'image_url',image_url:{url:a.b64}}))]};
    else lastU={role:'user',content:tc||'...'};
    const hist=c.msgs.slice(0,-1).slice(-14).map(m=>({role:m.role==='user'?'user':'assistant',content:typeof m.content==='string'?m.content:(m.content?.text||'')}));
    const hasImgs=imgs.length>0;
    const mdlId=hasImgs&&!MODELS.find(m=>m.id===S.mdl)?.vision?'meta-llama/llama-4-scout-17b-16e-instruct':S.mdl;
    const r=await fetch(CHAT_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:buildPrompt(),messages:[...hist,lastU],hasImages:hasImgs,model:mdlId})});
    document.getElementById(tid)?.remove();
    if(!r.ok){const e=await r.json();throw new Error(e.error||'Lỗi server');}
    const data=await r.json();
    const bMsg={role:'assistant',content:data.reply,time,bid:S.bot.id};
    c.msgs.push(bMsg); c.upd=Date.now();
    appendMsg(bMsg); renderHist(); LS.save();
  }catch(e){
    document.getElementById(tid)?.remove();
    appendMsg({role:'assistant',content:`⚠ ${e.message}`,time,bid:S.bot.id});
  }finally{
    S.sending=false; document.getElementById('send-btn').disabled=false;
    document.getElementById('msg-inp').focus();
  }
}

/* ── FILES ── */
async function onFile(e){
  for(const file of Array.from(e.target.files)){
    if(file.size>8*1024*1024){Toast.err(`${file.name}: quá lớn`);continue;}
    const allowed=['image/png','image/jpeg','text/plain','application/pdf'];
    if(!allowed.includes(file.type)){Toast.err(`${file.name}: không hỗ trợ`);continue;}
    const a={name:file.name,type:file.type.startsWith('image/')?'image':file.type==='application/pdf'?'pdf':'text',url:'',b64:'',tc:''};
    if(a.type==='image'){
      await new Promise(res=>{const rd=new FileReader();rd.onload=ev=>{a.preview=a.url=a.b64=ev.target.result;res();};rd.readAsDataURL(file);});
    }else if(a.type==='text'){
      await new Promise(res=>{const rd=new FileReader();rd.onload=ev=>{a.tc=ev.target.result.slice(0,4000);res();};rd.readAsText(file);});
    }else{
      try{
        Toast.ok(`Đang đọc ${file.name}...`);
        const ab=await file.arrayBuffer();
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf=await pdfjsLib.getDocument({data:ab}).promise;
        let t='';
        for(let i=1;i<=Math.min(pdf.numPages,10);i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();t+=tc.items.map(s=>s.str).join(' ')+'\n';}
        a.tc=t.slice(0,4000);
      }catch{a.tc='(Không đọc được PDF)';}
    }
    S.atts.push(a); addThumb(a);
  }
  e.target.value='';
}
function addThumb(a){
  const bar=document.getElementById('att-prev'); bar.classList.add('show');
  const i=S.atts.indexOf(a);
  const d=document.createElement('div'); d.className='att-th'; d.id=`at-${i}`;
  d.innerHTML=a.type==='image'?`<img src="${a.preview}" alt=""><span>${a.name.slice(0,14)}</span><button class="att-rm" onclick="rmAtt(${i})">✕</button>`:`<span>📄</span><span>${a.name.slice(0,14)}</span><button class="att-rm" onclick="rmAtt(${i})">✕</button>`;
  bar.appendChild(d);
}
function rmAtt(i){S.atts.splice(i,1);document.getElementById(`at-${i}`)?.remove();if(!S.atts.length)document.getElementById('att-prev').classList.remove('show');}
function clearAtts(){S.atts=[];const b=document.getElementById('att-prev');b.innerHTML='';b.classList.remove('show');}

/* ── RENAME ── */
function showRename(){
  showModal(`<div class="modal-hd"><span class="modal-ttl">✏️ Đổi tên</span><button class="modal-x" onclick="closeModal()">✕</button></div>
  <div class="field"><label class="lbl">Tên mới</label><input class="inp" id="ri" value="${esc(S.un)}" maxlength="30" onkeydown="if(event.key==='Enter')doRename()"></div>
  <button class="m-btn" onclick="doRename()">Lưu</button>`);
  setTimeout(()=>document.getElementById('ri')?.select(),50);
}
function doRename(){
  const v=document.getElementById('ri')?.value.trim(); if(!v)return;
  S.un=v; document.getElementById('sb-uname').textContent=v; LS.save(); closeModal(); Toast.pk(`Tên đổi thành ${v} 🌸`);
}



/* ── MODAL / HELPERS ── */
function showModal(h){
  closeModal();
  const ov=document.createElement('div'); ov.className='ov'; ov.id='amod';
  ov.innerHTML=`<div class="modal">${h}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
}
function closeModal(){document.getElementById('amod')?.remove();}
function sa(id,msg,ok=false){
  const el=document.getElementById(id); if(!el)return;
  el.textContent=msg; el.className=`alert ${ok?'a-ok':'a-err'} show`;
}
function openSB(){document.getElementById('sidebar').classList.add('open');document.getElementById('mob-ov').classList.add('show');}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mob-ov').classList.remove('show');}
function openLbox(url){document.getElementById('lbox-img').src=url;document.getElementById('lbox').classList.add('show');}
function closeLbox(){document.getElementById('lbox').classList.remove('show');}

const Toast={
  show(msg,type){
    const el=document.createElement('div'); el.className=`toast ${type||''}`;
    el.innerHTML=`<div class="tdot"></div><span>${msg}</span>`;
    document.getElementById('toasts').appendChild(el);
    setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .25s';setTimeout(()=>el.remove(),250);},3000);
  },
  ok:m=>Toast.show(m,'ok'), err:m=>Toast.show(m,'err'),
  warn:m=>Toast.show(m,''), pk:m=>Toast.show(m,'pk'),
};
</script>
