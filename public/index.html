<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QuyTranChat 🐍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --s0: #060a06;
  --s1: #0b130b;
  --s2: #101c10;
  --s3: #152415;
  --s4: #1c2e1c;
  --s5: #243824;
  --line: #2a402a;
  --line2: #325032;
  --acc: #4ade80;
  --acc2: #22c55e;
  --acc3: #16a34a;
  --acc-dim: rgba(74,222,128,0.12);
  --acc-glow: rgba(74,222,128,0.25);
  --gold: #fbbf24;
  --red: #f87171;
  --t0: #e8f5e8;
  --t1: #a3c9a3;
  --t2: #5a7a5a;
  --t3: #3a553a;
  --font: 'Space Grotesk', sans-serif;
  --mono: 'Space Mono', monospace;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;
  --tr: 150ms ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--s0);color:var(--t0);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
img{display:block;max-width:100%}
a{color:var(--acc);text-decoration:none}

/* ── SNAKE BG CANVAS ── */
#snake-bg{position:fixed;inset:0;opacity:.18;pointer-events:none;z-index:0}

/* ── GATE ── */
#gate{position:fixed;inset:0;background:var(--s0);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;
  background: radial-gradient(ellipse at 50% 60%, #0d1f0d 0%, var(--s0) 70%)}
#gate.hide{display:none}
.gate-box{width:100%;max-width:360px;text-align:center;position:relative;z-index:1}

.gate-snake{margin:0 auto 24px;width:80px;height:80px;position:relative}
.gate-snake svg{width:80px;height:80px;filter:drop-shadow(0 0 16px rgba(74,222,128,.5))}

.gate-logo{font-size:28px;font-weight:700;color:var(--acc);letter-spacing:-.02em;margin-bottom:4px}
.gate-logo span{color:var(--t1)}
.gate-sub{font-size:11px;color:var(--t3);font-family:var(--mono);margin-bottom:32px;letter-spacing:.08em}
.gate-name-wrap{position:relative;margin-bottom:10px}
.gate-name-wrap input{
  width:100%;background:var(--s2);border:1px solid var(--line2);border-radius:var(--r12);
  padding:14px 16px;font-size:15px;color:var(--t0);outline:none;text-align:center;
  transition:border-color var(--tr),box-shadow var(--tr)}
.gate-name-wrap input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-dim)}
.gate-name-wrap input::placeholder{color:var(--t3)}
.gate-btn{
  width:100%;padding:14px;background:var(--acc);color:var(--s0);border-radius:var(--r12);
  font-size:14px;font-weight:700;letter-spacing:.06em;font-family:var(--mono);
  transition:all var(--tr);position:relative;overflow:hidden}
.gate-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.15) 50%,transparent 100%);
  transform:translateX(-100%);transition:transform .4s ease}
.gate-btn:hover{filter:brightness(1.1);box-shadow:0 0 24px var(--acc-glow)}
.gate-btn:hover::after{transform:translateX(100%)}
.gate-btn:active{scale:.98}
.gate-err{font-size:11px;color:var(--red);margin-top:8px;font-family:var(--mono);min-height:16px}

/* ── APP LAYOUT ── */
#app{display:none;height:100vh;position:relative;z-index:1}
#app.show{display:flex}

/* ── SIDEBAR ── */
#sidebar{
  width:270px;background:var(--s1);border-right:1px solid var(--line);
  display:flex;flex-direction:column;flex-shrink:0;transition:transform var(--tr);z-index:10}
#sb-head{padding:18px 16px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
.sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sb-brand-icon svg{width:28px;height:28px;filter:drop-shadow(0 0 6px var(--acc))}
.sb-brand-text{font-size:16px;font-weight:700;color:var(--acc);letter-spacing:-.01em}
.sb-brand-text em{color:var(--t2);font-style:normal;font-weight:400}
#sb-user{font-size:11px;color:var(--t2);font-family:var(--mono);display:flex;align-items:center;gap:6px}
#sb-user .dot{width:6px;height:6px;background:var(--acc);border-radius:50%;flex-shrink:0;
  box-shadow:0 0 6px var(--acc);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* sidebar tabs */
.sb-tabs{display:flex;gap:4px;padding:8px 12px 0;border-bottom:1px solid var(--line)}
.sb-tab{flex:1;padding:8px 4px;font-size:11px;font-weight:600;font-family:var(--mono);color:var(--t3);
  letter-spacing:.04em;border-radius:var(--r8) var(--r8) 0 0;transition:all var(--tr);text-align:center}
.sb-tab:hover{color:var(--t1)}
.sb-tab.active{color:var(--acc);background:var(--s2);border:1px solid var(--line);border-bottom:1px solid var(--s2)}

.sb-panel{flex:1;overflow-y:auto;padding:8px}
.sb-panel.hide{display:none}

/* model/bot list */
.section-label{
  font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;
  padding:12px 8px 6px;font-family:var(--mono)}
.bot-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r8);
  cursor:pointer;transition:all var(--tr);position:relative;margin-bottom:2px}
.bot-item:hover{background:var(--s3)}
.bot-item.active{background:var(--s3);border:1px solid var(--line2)}
.bot-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:2px;height:60%;background:var(--acc);border-radius:0 2px 2px 0;
  box-shadow:0 0 6px var(--acc)}
.bot-av{
  width:36px;height:36px;border-radius:10px;background:var(--s4);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
  overflow:hidden;border:1px solid var(--line)}
.bot-av img{width:100%;height:100%;object-fit:cover}
.bot-info{flex:1;min-width:0}
.bot-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t0)}
.bot-desc{font-size:10px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.bot-badge{
  font-size:9px;font-family:var(--mono);font-weight:700;flex-shrink:0;padding:2px 5px;border-radius:4px}
.bot-badge.free{background:rgba(74,222,128,.15);color:var(--acc);border:1px solid rgba(74,222,128,.3)}
.bot-badge.fast{background:rgba(251,191,36,.12);color:var(--gold);border:1px solid rgba(251,191,36,.25)}
.bot-badge.hot{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}

/* history panel */
.hist-item{
  padding:9px 10px;border-radius:var(--r8);cursor:pointer;transition:all var(--tr);
  margin-bottom:2px;display:flex;align-items:flex-start;gap:8px}
.hist-item:hover{background:var(--s3)}
.hist-item.active{background:var(--s3)}
.hist-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.hist-info{flex:1;min-width:0}
.hist-title{font-size:12px;font-weight:500;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-meta{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--mono)}
.hist-del{padding:4px;color:var(--t3);border-radius:4px;transition:all var(--tr);flex-shrink:0;font-size:12px}
.hist-del:hover{background:rgba(248,113,113,.15);color:var(--red)}

.hist-new-btn{
  width:100%;padding:10px;background:var(--acc-dim);border:1px dashed var(--line2);
  border-radius:var(--r8);font-size:12px;color:var(--acc);font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;
  transition:all var(--tr)}
.hist-new-btn:hover{background:rgba(74,222,128,.18);border-color:var(--acc)}

#sb-footer{border-top:1px solid var(--line);padding:10px;flex-shrink:0}
.sb-footer-info{font-size:10px;color:var(--t3);font-family:var(--mono);text-align:center}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--s0)}

/* header */
#chat-hdr{
  height:54px;border-bottom:1px solid var(--line);display:flex;align-items:center;
  padding:0 14px;gap:10px;flex-shrink:0;background:var(--s1)}
#mob-menu{display:none;padding:6px;border-radius:var(--r8);color:var(--t2);font-size:18px}
#mob-menu:hover{background:var(--s3);color:var(--t0)}
#hdr-av{
  width:34px;height:34px;border-radius:10px;overflow:hidden;background:var(--s4);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;border:1px solid var(--line)}
#hdr-av img{width:100%;height:100%;object-fit:cover}
#hdr-name{font-weight:700;font-size:14px;color:var(--t0)}
#hdr-model{font-size:10px;color:var(--acc);font-family:var(--mono);margin-top:1px}
.hdr-right{margin-left:auto;display:flex;gap:4px;align-items:center}
.hdr-btn{
  padding:6px 10px;border-radius:var(--r8);font-size:10px;font-family:var(--mono);
  color:var(--t2);transition:all var(--tr);letter-spacing:.04em}
.hdr-btn:hover{background:var(--s3);color:var(--t0)}
.hdr-btn.danger:hover{background:rgba(248,113,113,.12);color:var(--red)}

/* messages */
#msgs-wrap{flex:1;overflow-y:auto;padding:16px 20px;scroll-behavior:smooth}
#msgs-inner{display:flex;flex-direction:column;gap:14px;min-height:100%;justify-content:flex-end}

/* welcome */
.welcome{text-align:center;padding:48px 24px}
.welcome-snake{margin:0 auto 20px;width:60px;height:60px}
.welcome-snake svg{width:60px;height:60px;opacity:.6}
.welcome h2{font-size:20px;font-weight:700;color:var(--t0);margin-bottom:8px}
.welcome p{font-size:13px;color:var(--t2);line-height:1.6;max-width:320px;margin:0 auto}

/* messages */
.msg{display:flex;align-items:flex-start;gap:10px;max-width:100%;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-av{
  width:32px;height:32px;border-radius:9px;background:var(--s4);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  font-weight:700;flex-shrink:0;border:1px solid var(--line);overflow:hidden}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg.user .msg-av{background:var(--s3);border-color:var(--line2)}
.msg-body{flex:1;min-width:0;max-width:calc(100% - 44px)}
.msg-name{font-size:10px;font-weight:600;color:var(--t2);margin-bottom:4px;font-family:var(--mono);letter-spacing:.04em}
.msg.user .msg-name{text-align:right;color:var(--acc)}
.msg-bubble{
  display:inline-block;max-width:100%;padding:10px 14px;border-radius:var(--r12);
  font-size:13.5px;line-height:1.65;word-break:break-word}
.msg.bot .msg-bubble{
  background:var(--s2);border:1px solid var(--line);border-radius:4px var(--r12) var(--r12) var(--r12)}
.msg.user .msg-bubble{
  background:var(--s3);border:1px solid var(--line2);border-radius:var(--r12) 4px var(--r12) var(--r12);
  float:right}
.msg.user .msg-body{display:flex;flex-direction:column;align-items:flex-end}
.msg-time{font-size:10px;color:var(--t3);margin-top:4px;font-family:var(--mono)}

/* markdown inside bubble */
.msg-bubble p{margin-bottom:.5em}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble code{background:var(--s4);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--acc)}
.msg-bubble pre{background:var(--s1);border:1px solid var(--line);border-radius:var(--r8);padding:12px;overflow-x:auto;margin:.5em 0}
.msg-bubble pre code{background:none;padding:0;color:var(--t1)}
.msg-bubble strong{color:var(--t0);font-weight:600}
.msg-bubble em{color:var(--t1)}
.msg-bubble ul,.msg-bubble ol{padding-left:18px;margin:.4em 0}
.msg-bubble li{margin:.2em 0}
.msg-bubble blockquote{border-left:2px solid var(--acc);padding-left:10px;color:var(--t2);margin:.4em 0}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{color:var(--acc);font-weight:600;margin:.6em 0 .3em}

/* thinking */
.think-bubble{
  display:inline-flex;gap:5px;align-items:center;padding:12px 14px;
  background:var(--s2);border:1px solid var(--line);border-radius:4px var(--r12) var(--r12) var(--r12)}
.think-dot{width:6px;height:6px;background:var(--acc);border-radius:50%;animation:bounce .9s infinite}
.think-dot:nth-child(2){animation-delay:.2s}
.think-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* attachments */
.msg-att-img{max-width:200px;border-radius:var(--r8);margin-top:6px;cursor:pointer;border:1px solid var(--line)}
.msg-att-file{display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:6px 10px;
  background:var(--s1);border:1px solid var(--line);border-radius:var(--r8);font-size:12px;color:var(--t2)}

/* input area */
#input-area{flex-shrink:0;padding:10px 14px 12px;background:var(--s1);border-top:1px solid var(--line)}
#att-preview{display:none;gap:8px;flex-wrap:wrap;margin-bottom:8px}
#att-preview.show{display:flex}
.att-thumb{
  display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--s2);
  border:1px solid var(--line);border-radius:var(--r8);font-size:11px;color:var(--t1);max-width:160px}
.att-thumb img{width:28px;height:28px;object-fit:cover;border-radius:4px}
.att-thumb span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.att-rm{padding:2px;color:var(--t3);font-size:12px;flex-shrink:0;line-height:1;border-radius:3px;transition:all var(--tr)}
.att-rm:hover{color:var(--red);background:rgba(248,113,113,.1)}

#input-box{display:flex;align-items:flex-end;gap:8px;background:var(--s2);
  border:1px solid var(--line);border-radius:var(--r12);padding:8px 10px;transition:border-color var(--tr)}
#input-box:focus-within{border-color:var(--line2)}
.inp-btn{padding:6px;color:var(--t3);border-radius:6px;transition:all var(--tr);font-size:16px;flex-shrink:0}
.inp-btn:hover{background:var(--s4);color:var(--acc)}
#msg-inp{
  flex:1;background:none;border:none;outline:none;resize:none;color:var(--t0);
  font-size:14px;line-height:1.5;max-height:140px;min-height:22px}
#msg-inp::placeholder{color:var(--t3)}
.send-btn{
  padding:7px 16px;background:var(--acc);color:var(--s0);border-radius:var(--r8);
  font-size:11px;font-weight:700;font-family:var(--mono);letter-spacing:.06em;
  flex-shrink:0;transition:all var(--tr)}
.send-btn:hover{filter:brightness(1.1);box-shadow:0 0 12px var(--acc-glow)}
.send-btn:active{scale:.97}
.send-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── MODEL BROWSER ── */
.model-card{
  display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:var(--r12);
  border:1px solid var(--line);margin-bottom:6px;cursor:pointer;transition:all var(--tr);background:var(--s1)}
.model-card:hover{border-color:var(--line2);background:var(--s2)}
.model-card.selected{border-color:var(--acc);background:var(--acc-dim)}
.model-icon{width:36px;height:36px;border-radius:8px;background:var(--s3);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.model-info{flex:1;min-width:0}
.model-name{font-size:12px;font-weight:600;color:var(--t0);font-family:var(--mono)}
.model-desc{font-size:11px;color:var(--t2);margin-top:2px;line-height:1.4}
.model-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.model-tag{font-size:9px;padding:2px 6px;border-radius:3px;font-family:var(--mono);font-weight:700}
.model-tag.speed{background:rgba(74,222,128,.12);color:var(--acc)}
.model-tag.vision{background:rgba(251,191,36,.1);color:var(--gold)}
.model-tag.power{background:rgba(147,51,234,.12);color:#c084fc}
.model-check{font-size:18px;color:var(--acc);flex-shrink:0;line-height:1;margin-top:8px}

/* ── TOAST ── */
#toast-root{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--s3);
  border:1px solid var(--line2);border-radius:var(--r8);font-size:12px;color:var(--t1);
  animation:toastIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.success{border-color:var(--acc);color:var(--acc)}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.t-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── LIGHTBOX ── */
#lbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:9998;cursor:zoom-out}
#lbox.show{display:flex}
#lbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:var(--r8)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,10,0,.8);display:flex;align-items:center;justify-content:center;z-index:9000;padding:20px;backdrop-filter:blur(4px)}
.modal{
  width:100%;max-width:460px;background:var(--s2);border:1px solid var(--line2);
  border-radius:var(--r16);padding:20px;max-height:80vh;overflow-y:auto;
  box-shadow:0 0 40px rgba(74,222,128,.1)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-weight:700;font-size:15px;color:var(--acc)}
.modal-close{padding:6px;border-radius:6px;color:var(--t3);font-size:18px;line-height:1;transition:all var(--tr)}
.modal-close:hover{background:var(--s4);color:var(--t0)}
.field{margin-bottom:12px}
.label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;font-family:var(--mono);letter-spacing:.04em}
.inp{
  width:100%;background:var(--s1);border:1px solid var(--line);border-radius:var(--r8);
  padding:10px 12px;font-size:13px;color:var(--t0);outline:none;transition:border-color var(--tr)}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:80px;line-height:1.5}
.alert{display:none;padding:10px 12px;border-radius:var(--r8);font-size:12px;margin-bottom:12px;font-family:var(--mono)}
.alert.show{display:block}
.alert-ok{background:rgba(74,222,128,.1);color:var(--acc);border:1px solid rgba(74,222,128,.3)}
.alert-err{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.btn{padding:11px 20px;border-radius:var(--r8);font-size:13px;font-weight:600;transition:all var(--tr)}
.btn-primary{background:var(--acc);color:var(--s0);font-family:var(--mono);font-weight:700;letter-spacing:.04em}
.btn-primary:hover{filter:brightness(1.1);box-shadow:0 0 12px var(--acc-glow)}
.btn-ghost{background:var(--s3);color:var(--t1);border:1px solid var(--line)}
.btn-ghost:hover{background:var(--s4)}
.w-full{width:100%}
.mt8{margin-top:8px}
.mt12{margin-top:12px}

/* ── MOBILE ── */
#overlay-mob{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9;backdrop-filter:blur(2px)}
#overlay-mob.show{display:block}
@media(max-width:680px){
  #mob-menu{display:flex;align-items:center;justify-content:center}

/* ─── SNAKE BACKGROUND CANVAS ─── */
(function(){
  const c = document.getElementById('snake-bg');
  const ctx = c.getContext('2d');
  let W, H;
  const snakes = [];

  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  resize();
  window.addEventListener('resize', resize);

  class Snake {
    constructor(){this.reset(true)}
    reset(init){
      this.pts = [];
      this.x = Math.random()*W;
      this.y = init ? Math.random()*H : (Math.random()>.5 ? -20 : H+20);
      this.angle = Math.random()*Math.PI*2;
      this.speed = .4 + Math.random()*.4;
      this.len = 60 + Math.random()*80;
      this.thick = 1.5 + Math.random()*2;
      this.life = 0;
      this.maxLife = 400 + Math.random()*300;
    }
    update(){
      this.angle += (Math.random()-.5)*.12;
      this.x += Math.cos(this.angle)*this.speed;
      this.y += Math.sin(this.angle)*this.speed;
      this.pts.push({x:this.x, y:this.y});
      if(this.pts.length > this.len) this.pts.shift();
      this.life++;
      if(this.life > this.maxLife || this.x<-50||this.x>W+50||this.y<-50||this.y>H+50) this.reset();
    }
    draw(){
      if(this.pts.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(this.pts[0].x, this.pts[0].y);
      for(let i=1;i<this.pts.length;i++) ctx.lineTo(this.pts[i].x,this.pts[i].y);
      ctx.strokeStyle = `rgba(74,222,128,${.3*(this.life/this.maxLife<.1?this.life/this.maxLife/.1:this.life/this.maxLife>.9?(1-this.life/this.maxLife)/.1:1)})`;
      ctx.lineWidth = this.thick;
      ctx.lineCap='round';
      ctx.lineJoin='round';
      ctx.stroke();
    }
  }

  for(let i=0;i<8;i++) snakes.push(new Snake());

  function loop(){
    ctx.clearRect(0,0,W,H);
    snakes.forEach(s=>{s.update();s.draw()});
    requestAnimationFrame(loop);
  }
  loop();
})();

/* ─── MARKDOWN ─── */
const MD = {
  render(text){
    if(!text) return '';
    try{
      return marked.parse(text, {breaks:true, gfm:true, headerIds:false, mangle:false});
    }catch{ return text.replace(/\n/g,'<br>'); }
  }
};

  bots: [],

/* ─── LOCALSTORAGE ─── */
const LS = {
  save(){
    try{
      const data = {
        username: State.username,
        selectedModel: State.selectedModel,
        conversations: State.conversations,
        currentConvId: State.currentConvId
      };
      localStorage.setItem('qtc-v2', JSON.stringify(data));
    }catch(e){ console.warn('LS save error:', e); }
  },
  load(){
    try{
      const raw = localStorage.getItem('qtc-v2');
      if(!raw) return null;
      return JSON.parse(raw);
    }catch{ return null; }
  },
  clear(){ localStorage.removeItem('qtc-v2'); }
};

/* ─── BOOT ─── */
window.addEventListener('DOMContentLoaded', ()=>{

  if(saved?.username){
    State.username = saved.username;
    State.selectedModel = saved.selectedModel || 'llama-3.3-70b-versatile';

function enterChat(){

  if(!name){ document.getElementById('name-err').textContent='Nhập tên đi nào 🐍'; return; }
  State.username = name;
  LS.save();
  bootApp();
}

async function bootApp(){
  document.getElementById('gate').classList.add('hide');
  document.getElementById('app').classList.add('show');
  document.getElementById('sb-uname').textContent = State.username;
  State.bots = [...BUILTIN_BOTS];
  try{
    const r = await fetch(`${SUPA_URL}/rest/v1/bot_requests?select=*&status=eq.approved&order=created_at.asc`,{
      headers:{'apikey':SUPA_ANON,'Authorization':`Bearer ${SUPA_ANON}`}});
    if(r.ok){
      const data = await r.json();
      State.bots.push(...data.map(b=>({
        id:b.id, name:b.name, emoji:'🤖', desc:b.description||'',
        prompt:b.prompt, custom:true
      })));
    }
  }catch{}
  renderBotList();
  renderModelList();
  renderHistoryList();

  // restore current conv
  if(State.currentConvId && State.conversations[State.currentConvId]){
    const conv = State.conversations[State.currentConvId];
    const bot = State.bots.find(b=>b.id===conv.botId);
    if(bot){ State.bot=bot; updateHeader(); renderMessages(); }
  }
}

function botHtml(b){
  const active = State.bot?.id===b.id ? 'active' : '';
  return `<div class="bot-item ${active}" id="bitem-${b.id}" onclick="selectBot('${b.id}')">
    <div class="bot-av">${b.avatar ? `<img src="${b.avatar}" alt="">` : b.emoji||b.name[0]}</div>
    <div class="bot-info">
      <div class="bot-name">${b.name}</div>
      <div class="bot-desc">${b.desc}</div>
    </div>
  </div>`;
}

function selectBot(id){

  if(!bot) return;
  State.bot = bot;
  document.querySelectorAll('.bot-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(`bitem-${id}`)?.classList.add('active');
  
  // Find or create conversation for this bot
  const convs = Object.values(State.conversations).filter(c=>c.botId===id);
  const latest = convs.sort((a,b)=>b.updated-a.updated)[0];
  if(latest){ State.currentConvId = latest.id; }
  else { newConversationForBot(id); }
  
  updateHeader();
  renderMessages();
  renderHistoryList();
  LS.save();
  closeSidebar();
  document.getElementById('msg-inp').focus();
}

  const m = MODELS.find(m=>m.id===State.selectedModel);
  document.getElementById('hdr-model').textContent = `${bot.desc} · ${m?.name||State.selectedModel}`;
}

}

function selectModel(id){
  State.selectedModel = id;
  renderModelList();
  updateHeader();
  LS.save();
  const m = MODELS.find(x=>x.id===id);
  Toast.success(`Đổi sang ${m?.name||id}`);
}

/* ─── CONVERSATIONS / HISTORY ─── */
function newConversationForBot(botId){
  const id = genId();
  State.conversations[id] = {
    id, botId, title: 'Cuộc trò chuyện mới',
    messages: [], created: Date.now(), updated: Date.now()
  };
  State.currentConvId = id;
  return id;
}

function newConversation(){
  if(!State.bot){ Toast.warn('Chọn nhân vật trước!'); return; }
  newConversationForBot(State.bot.id);
  renderMessages();
  renderHistoryList();
  LS.save();
  switchTab('bots');
  closeSidebar();
}

function getCurrentConv(){
  return State.currentConvId ? State.conversations[State.currentConvId] : null;
}

function renderHistoryList(){
  const list = document.getElementById('hist-list');
  const all = Object.values(State.conversations)
    .sort((a,b)=>b.updated-a.updated)
    .slice(0, 50);
  
  if(!all.length){
    list.innerHTML = `<div style="text-align:center;padding:24px;color:var(--t3);font-size:12px">Chưa có lịch sử</div>`;
    return;
  }
  
  list.innerHTML = all.map(conv=>{
    const bot = State.bots.find(b=>b.id===conv.botId);
    const active = conv.id===State.currentConvId ? 'active' : '';
    const date = new Date(conv.updated).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});
    return `<div class="hist-item ${active}" onclick="loadConversation('${conv.id}')">
      <div class="hist-icon">${bot?.emoji||'🐍'}</div>
      <div class="hist-info">
        <div class="hist-title">${escHtml(conv.title)}</div>
        <div class="hist-meta">${bot?.name||'Bot'} · ${date} · ${conv.messages.length} tin</div>
      </div>
      <button class="hist-del" onclick="deleteConv('${conv.id}',event)" title="Xóa">✕</button>
    </div>`;
  }).join('');
}

function loadConversation(id){
  const conv = State.conversations[id];
  if(!conv) return;
  State.currentConvId = id;
  const bot = State.bots.find(b=>b.id===conv.botId);
  if(bot){
    State.bot = bot;
    document.querySelectorAll('.bot-item').forEach(el=>el.classList.remove('active'));
    document.getElementById(`bitem-${bot.id}`)?.classList.add('active');
    updateHeader();
  }
  renderMessages();
  renderHistoryList();
  LS.save();
  closeSidebar();
}

function deleteConv(id, e){
  e.stopPropagation();
  delete State.conversations[id];
  if(State.currentConvId===id){
    State.currentConvId = null;
    renderMessages();
  }
  renderHistoryList();
  LS.save();
}

function clearCurrentChat(){
  const conv = getCurrentConv();
  if(!conv){ Toast.warn('Không có chat để xóa'); return; }
  conv.messages = [];
  conv.title = 'Cuộc trò chuyện mới';
  renderMessages();
  renderHistoryList();
  LS.save();
  Toast.info('Đã xóa chat');
}

/* ─── RENDER MESSAGES ─── */
function renderMessages(){
  const inner = document.getElementById('msgs-inner');
  const conv = getCurrentConv();
  if(!conv || !conv.messages.length){
    const bot = State.bot;
    inner.innerHTML = bot
      ? `<div class="welcome">
          <div class="welcome-snake"><svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M30 52 C16 52 8 43 8 35 C8 25 16 21 24 28 C32 35 21 44 14 38 C7 32 12 20 22 17 C32 14 40 22 38 33 C36 42 28 46 22 42" stroke="#4ade80" stroke-width="5" fill="none" stroke-linecap="round" opacity=".7"/><ellipse cx="22" cy="42" rx="6" ry="5" fill="#22c55e" opacity=".7" transform="rotate(-20,22,42)"/></svg></div>
          <h2>${escHtml(bot.name)}</h2>
          <p>${escHtml(bot.desc)}</p>
         </div>`
      : `<div class="welcome"><div class="welcome-snake"><svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M30 52 C16 52 8 43 8 35 C8 25 16 21 24 28 C32 35 21 44 14 38 C7 32 12 20 22 17 C32 14 40 22 38 33 C36 42 28 46 22 42" stroke="#4ade80" stroke-width="5" fill="none" stroke-linecap="round" opacity=".7"/><ellipse cx="22" cy="42" rx="6" ry="5" fill="#22c55e" opacity=".7" transform="rotate(-20,22,42)"/></svg></div><h2>Xin chào! 🐍</h2><p>Chọn nhân vật bên trái để bắt đầu trò chuyện.</p></div>`;
    return;
  }
  inner.innerHTML = conv.messages.map(m=>buildMsgHtml(m)).join('');
  scrollBot();
}

function buildMsgHtml(m){
  const isUser = m.role==='user';
  const bot = State.bots.find(b=>b.id===m.botId) || State.bot;
  const avContent = isUser
    ? escHtml(State.username[0]?.toUpperCase()||'?')
    : (bot?.avatar ? `<img src="${bot.avatar}" alt="">` : (bot?.emoji||bot?.name?.[0]||'🐍'));

  const atts = m.attachments||[];
  const attHtml = atts.map(a=>{
    if(a.type==='image') return `<img class="msg-att-img" src="${a.url}" onclick="openLbox('${a.url}')" alt="${escHtml(a.name)}">`;
    return `<div class="msg-att-file">📄 ${escHtml(a.name)}</div>`;
  }).join('');

  const nameHtml = !isUser ? `<div class="msg-name">${escHtml(bot?.name||'Bot')}</div>` : `<div class="msg-name">${escHtml(State.username)}</div>`;
  const text = typeof m.content==='string' ? m.content : (m.content?.text||'');

  return `<div class="msg ${isUser?'user':'bot'}">
    ${!isUser?`<div class="msg-av">${avContent}</div>`:''}
    <div class="msg-body">
      ${nameHtml}
      <div class="msg-bubble">${MD.render(text)}${attHtml}</div>
      ${m.time?`<div class="msg-time">${escHtml(m.time)}</div>`:''}
    </div>
    ${isUser?`<div class="msg-av">${avContent}</div>`:''}
  </div>`;
}

function appendMsg(m){
  const inner = document.getElementById('msgs-inner');
  const welcome = inner.querySelector('.welcome');
  if(welcome) welcome.remove();
  const el = document.createElement('div');
  el.innerHTML = buildMsgHtml(m);
  inner.appendChild(el.firstElementChild);
  scrollBot();
}

function scrollBot(){
  const w = document.getElementById('msgs-wrap');
  requestAnimationFrame(()=>{ w.scrollTop = w.scrollHeight; });
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ─── SEND ─── */
function onKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
}
function grow(el){
  el.style.height='auto';
  el.style.height = Math.min(el.scrollHeight,140)+'px';
}

async function sendMsg(){
  if(!State.bot){ Toast.warn('Chọn nhân vật trước!'); return; }
  if(State.sending) return;
  const inp = document.getElementById('msg-inp');
  const text = inp.value.trim();
  const atts = [...State.pendingAtts];
  if(!text && !atts.length) return;

  inp.value=''; inp.style.height='auto';
  clearAtts();
  State.sending=true;
  document.getElementById('send-btn').disabled=true;

  // Ensure conversation exists
  if(!State.currentConvId || !State.conversations[State.currentConvId]){
    newConversationForBot(State.bot.id);
  }
  const conv = getCurrentConv();

  const time = new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
  const userMsg = {role:'user',content:text,attachments:atts,time,botId:State.bot.id};
  conv.messages.push(userMsg);
  
  // Auto-title from first message
  if(conv.messages.length===1 && text){
    conv.title = text.slice(0,40) + (text.length>40?'...':'');
  }
  conv.updated = Date.now();
  
  appendMsg(userMsg);

  // thinking
  const thinkId = `think-${Date.now()}`;
  const thinkEl = document.createElement('div');
  thinkEl.id=thinkId; thinkEl.className='msg bot';
  const botAv = State.bot.avatar ? `<img src="${State.bot.avatar}" alt="">` : (State.bot.emoji||State.bot.name[0]);
  thinkEl.innerHTML=`<div class="msg-av">${botAv}</div><div class="msg-body"><div class="msg-name">${escHtml(State.bot.name)}</div><div class="think-bubble"><div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div></div></div>`;
  document.getElementById('msgs-inner').appendChild(thinkEl);
  scrollBot();

  try{
    const images = atts.filter(a=>a.type==='image'&&a.base64);
    const textAtts = atts.filter(a=>a.type!=='image');
    let textParts = [text];
    textAtts.forEach(a=>{ if(a.textContent) textParts.push(`[${a.type==='pdf'?'PDF':'File'}: ${a.name}]\n${a.textContent}`); });
    const textContent = textParts.filter(Boolean).join('\n\n');

    let lastUserMsg;
    if(images.length){
      lastUserMsg={role:'user',content:[
        ...(textContent?[{type:'text',text:textContent}]:[]),
        ...images.map(a=>({type:'image_url',image_url:{url:a.base64}}))
      ]};
    } else {
      lastUserMsg={role:'user',content:textContent||'...'};
    }

    // Build history for API (last 12 msgs, no attachments)
    const histMsgs = conv.messages.slice(0,-1).slice(-12).map(m=>({
      role: m.role==='user'?'user':'assistant',
      content: typeof m.content==='string' ? m.content : (m.content?.text||'')
    }));

    // System prompt includes user name
    const systemPrompt = State.bot.prompt + `\n\nTên người dùng: ${State.username}. Nhớ tên này và dùng khi phù hợp.`;

    const hasImages = images.length>0;
    // Pick model: if has images, prefer vision model
    const modelId = hasImages && !MODELS.find(m=>m.id===State.selectedModel)?.vision
      ? 'meta-llama/llama-4-scout-17b-16e-instruct'
      : State.selectedModel;

    const r = await fetch(CHAT_API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        prompt: systemPrompt,
        messages: [...histMsgs, lastUserMsg],
        hasImages,
        model: modelId
      })
    });

    document.getElementById(thinkId)?.remove();

    if(!r.ok){ const e=await r.json(); throw new Error(e.error||'Lỗi server'); }
    const data = await r.json();
    const reply = data.reply;

    const botMsg = {role:'assistant',content:reply,time,botId:State.bot.id};
    conv.messages.push(botMsg);
    conv.updated = Date.now();
    appendMsg(botMsg);
    renderHistoryList();
    LS.save();

  }catch(e){
    document.getElementById(thinkId)?.remove();
    appendMsg({role:'assistant',content:`⚠ ${e.message}`,time,botId:State.bot.id});
  }finally{
    State.sending=false;
    document.getElementById('send-btn').disabled=false;
    document.getElementById('msg-inp').focus();
  }
}

/* ─── FILE UPLOAD ─── */
async function onFile(e){
  const allowed=['image/png','image/jpeg','text/plain','application/pdf'];
  for(const file of Array.from(e.target.files)){
    if(file.size>8*1024*1024){ Toast.error(`${file.name}: quá lớn (max 8MB)`); continue; }
    if(!allowed.includes(file.type)){ Toast.error(`${file.name}: không hỗ trợ`); continue; }
    const att={name:file.name,type:file.type.startsWith('image/')?'image':file.type==='application/pdf'?'pdf':'text',url:'',base64:'',textContent:''};
    
    if(att.type==='image'){
      await new Promise(res=>{
        const reader=new FileReader();
        reader.onload=ev=>{ att.preview=att.url=att.base64=ev.target.result; res(); };
        reader.readAsDataURL(file);
      });
    } else if(att.type==='text'){
      await new Promise(res=>{
        const reader=new FileReader();
        reader.onload=ev=>{ att.textContent=ev.target.result.slice(0,4000); res(); };
        reader.readAsText(file);
      });
    } else if(att.type==='pdf'){
      try{
        Toast.info(`Đang đọc ${file.name}...`);
        const ab=await file.arrayBuffer();
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf=await pdfjsLib.getDocument({data:ab}).promise;
        let text='';
        for(let i=1;i<=Math.min(pdf.numPages,10);i++){
          const page=await pdf.getPage(i);
          const tc=await page.getTextContent();
          text+=tc.items.map(s=>s.str).join(' ')+'\n';
        }
        att.textContent=text.slice(0,4000);
      }catch{ att.textContent='(Không đọc được PDF)'; }
    }
    State.pendingAtts.push(att);
    addThumb(att);
  }
  e.target.value='';
}

function addThumb(att){
  const bar=document.getElementById('att-preview');
  bar.classList.add('show');
  const idx=State.pendingAtts.indexOf(att);
  const d=document.createElement('div');
  d.className='att-thumb'; d.id=`at-${idx}`;
  d.innerHTML=att.type==='image'
    ? `<img src="${att.preview}" alt=""><span>${att.name.slice(0,16)}</span><button class="att-rm" onclick="removeAtt(${idx})">✕</button>`
    : `<span>📄</span><span>${att.name.slice(0,16)}</span><button class="att-rm" onclick="removeAtt(${idx})">✕</button>`;
  bar.appendChild(d);
}

function removeAtt(idx){ State.pendingAtts.splice(idx,1); document.getElementById(`at-${idx}`)?.remove(); if(!State.pendingAtts.length) document.getElementById('att-preview').classList.remove('show'); }
function clearAtts(){ State.pendingAtts=[]; const b=document.getElementById('att-preview'); b.innerHTML=''; b.classList.remove('show'); }

/* ─── SUGGEST BOT ─── */
function showSuggest(){
  showModal(`
    <div class="modal-hdr">
      <span class="modal-title">🐍 Đề xuất nhân vật mới</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="sug-ok" class="alert alert-ok"></div>
    <div id="sug-err" class="alert alert-err"></div>
    <div class="field"><label class="label">Tên nhân vật</label><input class="inp" id="s-name" placeholder="Tên..."></div>
    <div class="field"><label class="label">Avatar URL (để trống nếu không có)</label><input class="inp" id="s-av" placeholder="https://...jpg"></div>
    <div class="field"><label class="label">Mô tả ngắn</label><input class="inp" id="s-desc" placeholder="Tính cách, phong cách..."></div>
    <div class="field"><label class="label">System Prompt</label><textarea class="inp" id="s-prompt" placeholder="Mô tả chi tiết nhân vật, cách nói chuyện..." style="min-height:120px"></textarea></div>
    <button class="btn btn-primary w-full mt8" onclick="submitSuggest()">GỬI ĐỀ XUẤT</button>`);
}

async function submitSuggest(){
  const name=document.getElementById('s-name').value.trim();
  const av=document.getElementById('s-av').value.trim();
  const desc=document.getElementById('s-desc').value.trim();
  const prompt=document.getElementById('s-prompt').value.trim();
  if(!name||!prompt){ showModalAlert('sug-err','Cần có tên và prompt!'); return; }
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/bot_requests`,{
      method:'POST',
      headers:{'apikey':SUPA_ANON,'Authorization':`Bearer ${SUPA_ANON}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({name,avatar_url:av||null,description:desc,prompt,submitted_by:State.username,status:'pending'})
    });
    if(!r.ok){ const e=await r.json(); throw new Error(e.message); }
    showModalAlert('sug-ok','✓ Đã gửi! Sẽ được xét duyệt sớm.',true);
    setTimeout(closeModal,2000);
  }catch(e){ showModalAlert('sug-err','Lỗi: '+e.message); }
}

/* ─── MODAL / UI ─── */
function showModal(html){
  closeModal();
  const ov=document.createElement('div');
  ov.className='overlay'; ov.id='active-modal';
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.addEventListener('click',e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal(){ document.getElementById('active-modal')?.remove(); }
function showModalAlert(id,msg,ok=false){
  const el=document.getElementById(id);
  if(!el) return;
  el.textContent=msg; el.className=`alert ${ok?'alert-ok':'alert-err'} show`;
}

function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay-mob').classList.add('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay-mob').classList.remove('show'); }
function openLbox(url){ document.getElementById('lbox-img').src=url; document.getElementById('lbox').classList.add('show'); }
function closeLbox(){ document.getElementById('lbox').classList.remove('show'); }

const Toast={
  show(msg,type='info'){
    const el=document.createElement('div');
    el.className=`toast ${type}`;
    el.innerHTML=`<div class="t-dot"></div><span>${msg}</span>`;
    document.getElementById('toast-root').appendChild(el);
    setTimeout(()=>el.remove(),3000);
  },
  success:m=>Toast.show(m,'success'),
  error:m=>Toast.show(m,'error'),
  info:m=>Toast.show(m,'info'),
  warn:m=>Toast.show(m,'info'),
};
</script>
